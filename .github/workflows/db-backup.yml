name: Daily Database Backup

on:
  schedule:
    # Corre todos los días a las 03:00 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Permite disparar el backup manualmente desde GitHub Actions

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PostgreSQL Client 17
        run: |
          sudo apt-get update
          sudo apt-get install -y wget ca-certificates
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          echo "deb http://apt.postgresql.org/pub/repos/apt/ $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17 netcat-openbsd dnsutils

      - name: Network Diagnostic
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          # Extraer el host de forma más robusta
          DB_HOST=$(echo "$DB_URL" | awk -F'[@/]' '{print $4}' | cut -d':' -f1)
          echo "🔍 Probando conexión con: $DB_HOST"
          
          # Ver que IPs resuelve
          echo "🌐 DNS Lookup (IPv4):"
          dig +short A $DB_HOST || echo "Sin registro A (IPv4)"
          echo "🌐 DNS Lookup (IPv6):"
          dig +short AAAA $DB_HOST || echo "Sin registro AAAA (IPv6)"
          
          # Probar puertos (usando pg_isready para ser más precisos)
          pg_isready -h $DB_HOST -p 5432 || pg_isready -h $DB_HOST -p 6543 || echo "❌ No se puede llegar al host."

      - name: Database Dump (pg_dump)
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$DB_URL" ]; then
            echo "❌ ERROR: El Secret SUPABASE_DB_URL no está configurado en GitHub."
            exit 1
          fi
          
          # Crear carpeta para backups si no existe
          mkdir -p backups
          
          # Ejecutar el dump con compresión
          # Se usa el Connection String completo de Supabase (Database settings > Connection string > URI)
          pg_dump "$DB_URL" --format=c --no-owner --no-privileges > backups/pnl_backup_$(date +%Y-%m-%d).dump
          
          echo "✅ Backup generado con éxito: backups/pnl_backup_$(date +%Y-%m-%d).dump"

      - name: Upload Backup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pnl_db_backup_${{ github.run_id }}
          path: backups/*.dump
          retention-days: 30 # Guardamos los backups por 30 días
          if-no-files-found: error
