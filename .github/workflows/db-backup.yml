name: Daily Database Backup

on:
  schedule:
    # Se ejecuta todos los días a las 03:00 UTC (12:00 AM ARG aprox)
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Permite ejecución manual si tenés ganas de dormir tranquilo

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PostgreSQL Client 17 (Production Method)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-common
          yes | sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh
          sudo apt-get install -y postgresql-client-17

      - name: Database Dump (pg_dump)
        env:
          # Para que esto funcione, recordá que ya tenés cargado el Secret "SUPABASE_DB_URL"
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$DB_URL" ]; then
            echo "❌ ERROR: El Secret SUPABASE_DB_URL no está configurado en GitHub."
            exit 1
          fi
          
          # Crear carpeta temporal para backups
          mkdir -p backups
          
          # Ejecutar el dump con compresión y la versión exacta 17
          /usr/lib/postgresql/17/bin/pg_dump "$DB_URL" --format=c --no-owner --no-privileges > backups/pnl_backup_$(date +%Y-%m-%d).dump
          
          echo "✅ Backup generado con éxito: pnl_backup_$(date +%Y-%m-%d).dump"

      - name: Upload Backup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-db-backup-${{ github.run_id }}
          path: backups/*.dump
          retention-days: 7
          # Lo guardamos por 7 días para no llenar el disco de GitHub al cuete
