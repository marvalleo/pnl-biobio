<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Foros - Moderación</title>
    <link rel="stylesheet" href="/out.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        :root {
            --pnl-blue: #0f172a;
            --pnl-gold: #fba931;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f3f4f6;
            color: var(--pnl-blue);
        }
    </style>
</head>

<body class="min-h-screen">
    <nav
        class="bg-white shadow-md border-b-4 border-[#fba931] px-6 py-1 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-6">
            <a href="admin-dashboard.html" class="flex items-center gap-3 hover:opacity-80 transition-all group">
                <img src="/assets/images/logos/pnl-del-biobio01.png" alt="Logo PNL" style="max-height: 70px;">
                <div class="flex flex-col text-left">
                    <span class="text-[9px] font-black uppercase text-[#fba931] leading-none mb-1">Moderación</span>
                    <span class="font-black text-lg uppercase leading-none">Admin Foros</span>
                </div>
            </a>

            <div class="h-8 w-[1px] bg-gray-200 hidden md:block"></div>

            <div class="hidden md:flex items-center gap-4">
                <a href="admin-dashboard.html"
                    class="flex items-center gap-1.5 text-[10px] font-black uppercase text-gray-400 hover:text-[#0f172a] transition-colors">
                    <span class="material-symbols-outlined text-lg">dashboard</span> Panel Central
                </a>
                <a href="index.html" target="_blank"
                    class="flex items-center gap-1.5 text-[10px] font-black uppercase text-gray-400 hover:text-blue-600 transition-colors">
                    <span class="material-symbols-outlined text-lg">visibility</span> Vista Usuario
                </a>
            </div>
        </div>

        <div id="user-menu-container" class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-full bg-gray-100 animate-pulse"></div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <h1 class="text-3xl font-900 uppercase mb-8">Moderación de Foros</h1>

        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-6">
            <h2 class="text-lg font-bold uppercase mb-4 border-b pb-2">Reportes Recientes</h2>

            <div id="reports-container" class="space-y-4">
                <!-- Cargando -->
                <div class="animate-pulse h-20 bg-gray-100 rounded-xl"></div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="supabase-config.js"></script>
    <script type="module" src="/shared.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            if (!window.isSupabaseInit) {
                // Pequeño delay de gracia
                await new Promise(r => setTimeout(r, 1000));
                if (!window.isSupabaseInit) {
                    console.error("Supabase no inicializado.");
                    return;
                }
            }

            const role = localStorage.getItem('pnl_user_role');
            if (role !== 'super_admin' && role !== 'admin_foros') {
                alert('Acceso no autorizado');
                window.location.href = 'forja-login.html';
                return;
            }
            if (typeof initNavbar === 'function') initNavbar();

            await loadReports();
        });

        async function loadReports() {
            const container = document.getElementById('reports-container');
            
            // Hacemos el fetch de reportes pendientes
            const { data: reports, error } = await supabaseClient
                .from('forum_reports')
                .select(`
                    id, reason, created_at, post_id,
                    forum_posts (id, content, topic_id, profiles(full_name)),
                    profiles (full_name)
                `)
                .eq('status', 'pending')
                .order('created_at', { ascending: false });

            if (error) {
                container.innerHTML = `<p class="text-red-500 text-sm font-bold">Error: ${error.message}</p>`;
                return;
            }

            if (!reports || reports.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center p-12 text-gray-300">
                        <span class="material-symbols-outlined text-6xl mb-4">gavel</span>
                        <p class="text-[10px] font-black uppercase tracking-widest text-[#0f172a]">No hay reportes pendientes</p>
                        <p class="text-xs font-bold text-gray-400 mt-2">La comunidad se está comportando.</p>
                    </div>`;
                return;
            }

            container.innerHTML = reports.map(r => `
                <div class="flex items-start gap-4 p-6 bg-white rounded-[2rem] border border-red-100 shadow-sm mb-4 transition-all" id="report-${r.id}">
                    <div class="w-10 h-10 rounded-full bg-red-50 flex items-center justify-center shrink-0 border border-red-100">
                        <span class="material-symbols-outlined text-red-500">flag</span>
                    </div>
                    <div class="flex-1">
                        <div class="flex items-center gap-3 mb-2">
                            <span class="bg-red-500 text-white text-[8px] font-black px-2 py-0.5 rounded uppercase tracking-widest">Pendiente</span>
                            <span class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">${new Date(r.created_at).toLocaleString('es-CL')}</span>
                        </div>
                        <h3 class="font-bold text-[#0f172a] mb-1">Motivo: <span class="text-red-600">${r.reason}</span></h3>
                        <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">
                            Denunciante: <strong>${r.profiles?.full_name || 'Alguien'}</strong> |
                            Autor Original: <strong>${r.forum_posts?.profiles?.full_name || 'Desconocido'}</strong>
                        </p>
                        
                        <div class="mt-4 bg-slate-50 p-4 rounded-2xl border border-slate-100 relative">
                            <span class="material-symbols-outlined absolute top-4 right-4 text-slate-200 text-4xl">format_quote</span>
                            <p class="text-xs text-slate-600 italic font-medium relative z-10 leading-relaxed">"${r.forum_posts?.content || 'Contenido no encontrado'}"</p>
                        </div>
                        
                        <a href="forja-foros-post.html?id=${r.forum_posts?.topic_id}" target="_blank" class="inline-flex items-center gap-1 mt-4 text-[10px] text-blue-600 font-black uppercase hover:underline">
                            <span class="material-symbols-outlined text-[14px]">visibility</span> Ver directamente en el foro
                        </a>
                    </div>
                    
                    <div class="flex flex-col gap-3 shrink-0 ml-4">
                        <button onclick="resolveReport('${r.id}', '${r.post_id}', 'delete', this)"
                            class="bg-[#0f172a] text-white px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:scale-105 transition-all shadow-xl flex items-center gap-2 justify-center">
                            <span class="material-symbols-outlined text-sm">delete_forever</span> Censurar
                        </button>
                        <button onclick="resolveReport('${r.id}', null, 'ignore', this)"
                            class="bg-white border-2 border-slate-200 text-slate-500 px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:border-slate-300 hover:text-slate-700 transition-all flex items-center gap-2 justify-center">
                            <span class="material-symbols-outlined text-sm">done_all</span> Ignorar
                        </button>
                    </div>
                </div>
            `).join('');
        }

        window.resolveReport = async function(reportId, postId, action, btnEl) {
            if (!confirm(action === 'delete' ? '¿Estás completamente seguro de censurar este mensaje? Esto es irreversible.' : '¿Deseas ignorar este reporte?')) return;
            
            window.setButtonLoading(btnEl, true);

            try {
                if (action === 'delete') {
                    // Soft delete
                    const { error: postError } = await supabaseClient
                        .from('forum_posts')
                        .update({ content: '[Mensaje eliminado por moderación]' })
                        .eq('id', postId);
                    if (postError) throw postError;

                    const { error: reportError } = await supabaseClient
                        .from('forum_reports')
                        .update({ status: 'resolved' })
                        .eq('id', reportId);
                    if (reportError) throw reportError;
                    
                } else if (action === 'ignore') {
                    const { error: reportError } = await supabaseClient
                        .from('forum_reports')
                        .update({ status: 'ignored' })
                        .eq('id', reportId);
                    if (reportError) throw reportError;
                }

                showToast(action === 'delete' ? 'Censura aplicada correctamente.' : 'Reporte descartado.', 'success');
                
                const el = document.getElementById('report-' + reportId);
                if (el) el.remove();
                
                const container = document.getElementById('reports-container');
                if (container.children.length === 0) {
                    loadReports();
                }
            } catch (err) {
                showToast(err.message, 'error');
                window.setButtonLoading(btnEl, false);
            }
        };

        function toggleUserMenu() {
            const dropdown = document.getElementById('user-dropdown');
            if (dropdown) dropdown.classList.toggle('hidden');
        }

        window.addEventListener('click', (e) => {
            const dropdown = document.getElementById('user-dropdown');
            const menuContainer = document.getElementById('user-menu-container');
            if (dropdown && !dropdown.classList.contains('hidden') && menuContainer && !menuContainer.contains(e.target)) {
                dropdown.classList.add('hidden');
            }
        });

    </script>
</body>

</html>
