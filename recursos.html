<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>Centro Multimedia - PNL Biobío</title>

    <!-- Google Fonts & Icons -->
    <link rel='stylesheet'
        href='https://fonts.googleapis.com/css?family=Roboto:100,100italic,300,300italic,regular,italic,500,500italic,700,700italic,900,900italic&amp;subset=latin,latin-ext&amp;display=swap' />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="/input.css">
    <link href="cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --pnl-blue: #182d56;
            --pnl-gold: #fba931;
            --pnl-dark: #0f172a;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #F9F9F9;
            color: #182d56;
            margin: 0;
            padding: 0;
            line-height: 1.4em;
        }

        h1, h2, h3, h4, .serif {
            font-family: 'Sentient-Regular', serif;
            color: var(--pnl-blue);
        }

        .content-card {
            background: white;
            border-radius: 2rem;
            border: 1px solid #e2e8f0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px -1px rgba(15, 23, 42, 0.05);
        }

        .content-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.1);
            border-color: var(--pnl-gold);
        }

        .filter-btn {
            transition: all 0.3s ease;
            font-family: 'Roboto', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 11px;
        }

        .filter-btn.active {
            background-color: var(--pnl-dark);
            color: white;
            border-color: var(--pnl-dark);
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.15);
        }

        .search-input {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }

        .search-input:focus {
            background: white;
            color: var(--pnl-dark);
            border-color: var(--pnl-gold);
            box-shadow: 0 0 25px rgba(251, 169, 49, 0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .media-item {
            animation: fadeIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        .gold-accent {
            height: 3px;
            background: linear-gradient(to r, var(--pnl-gold), #f59e0b, var(--pnl-gold));
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">

    <pnl-navbar type="public"></pnl-navbar>

    <!-- Header Seccion -->
    <header class="bg-[#0f172a] text-white py-24 relative overflow-hidden">
        <div class="absolute inset-0 opacity-5" style="background-image: radial-gradient(var(--pnl-gold) 1px, transparent 1px); background-size: 30px 30px;"></div>
        <div class="max-w-[1360px] mx-auto px-10 text-center relative z-10">
            <span class="text-[#fba931] font-black tracking-[0.4em] uppercase text-[10px] mb-6 block">Soberanía de Información</span>
            <h1 class="serif text-5xl md:text-6xl text-white mb-8 leading-tight">Centro de <span class="text-[#fba931]">Recursos</span></h1>
            <p class="text-gray-400 max-w-2xl mx-auto mb-12 font-medium leading-relaxed text-sm uppercase tracking-widest">
                Documentación oficial, material de formación y registros de la actividad libertaria en la Región del Biobío.
            </p>
            
            <!-- Buscador Premium -->
            <div class="max-w-xl mx-auto relative group">
                <input type="text" id="searchInput" placeholder="BUSCAR TEMÁTICA O DOCUMENTO..." 
                class="search-input w-full h-16 pl-14 pr-6 rounded-2xl text-white placeholder-gray-500 outline-none text-xs font-black uppercase tracking-widest">
                <span class="material-symbols-outlined absolute left-5 top-5 text-[#fba931] text-2xl group-hover:scale-110 transition-transform">search</span>
            </div>
        </div>
    </header>

    <main class="max-w-[1360px] mx-auto px-10 py-20 w-full flex-1">

        <!-- Barra de Filtros -->
        <section class="mb-20 flex flex-col items-center">
            <div class="flex flex-wrap justify-center gap-3">
                <button class="filter-btn active border-2 border-gray-100 text-gray-400 px-8 py-3 rounded-2xl flex items-center gap-3" data-filter="all">
                    <span class="material-symbols-outlined text-lg">grid_view</span> TODO
                </button>
                <button class="filter-btn border-2 border-gray-100 text-gray-400 px-8 py-3 rounded-2xl flex items-center gap-3" data-filter="pdf">
                    <span class="material-symbols-outlined text-lg text-red-500">picture_as_pdf</span> PDF
                </button>
                <button class="filter-btn border-2 border-gray-100 text-gray-400 px-8 py-3 rounded-2xl flex items-center gap-3" data-filter="video">
                    <span class="material-symbols-outlined text-lg text-blue-500">play_circle</span> VIDEOS
                </button>
                <button class="filter-btn border-2 border-gray-100 text-gray-400 px-8 py-3 rounded-2xl flex items-center gap-3" data-filter="ppt">
                    <span class="material-symbols-outlined text-lg text-orange-500">present_to_all</span> PRESENTACIONES
                </button>
                <button class="filter-btn border-2 border-gray-100 text-gray-400 px-8 py-3 rounded-2xl flex items-center gap-3" data-filter="audio">
                    <span class="material-symbols-outlined text-lg text-purple-500">headphones</span> AUDIOS
                </button>
            </div>
            <div id="resultsCount" class="mt-8 text-[9px] font-black uppercase tracking-[0.2em] text-gray-300">
                Sincronizando biblioteca multimedia...
            </div>
        </section>

        <!-- Galería de Recursos -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10" id="resourcesGrid">
            <!-- Skeletons -->
            <div class="bg-gray-100 h-80 rounded-[2rem] animate-pulse"></div>
            <div class="bg-gray-100 h-80 rounded-[2rem] animate-pulse"></div>
            <div class="bg-gray-100 h-80 rounded-[2rem] animate-pulse"></div>
            <div class="bg-gray-100 h-80 rounded-[2rem] animate-pulse"></div>
        </div>

    </main>

    <pnl-footer></pnl-footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="supabase-config.js"></script>
    <script type="module" src="/shared.js"></script>
    <script>
        let resources = [];
        let currentFilter = 'all';
        let searchQuery = '';

        window.addEventListener('DOMContentLoaded', async () => {
            // Esperar a que Supabase configure el cliente
            let attempts = 0;
            while (!window.isSupabaseInit && attempts < 10) {
                await new Promise(r => setTimeout(r, 500));
                attempts++;
            }
            
            if (window.isSupabaseInit) {
                loadResources();
            }
        });

        async function loadResources() {
            const { data, error } = await supabaseClient
                .from('multimedia_resources')
                .select('*')
                .eq('is_active', true)
                .order('created_at', { ascending: false });

            if (error) {
                console.error(error);
                return;
            }

            resources = data;
            filterAndRender();
        }

        function filterAndRender() {
            let filtered = resources;

            if (currentFilter !== 'all') {
                filtered = filtered.filter(r => r.type === currentFilter);
            }

            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                filtered = filtered.filter(r => 
                    r.title.toLowerCase().includes(q) || 
                    (r.description && r.description.toLowerCase().includes(q))
                );
            }

            renderResources(filtered);
        }

        function renderResources(data) {
            const grid = document.getElementById('resourcesGrid');
            const countLabel = document.getElementById('resultsCount');

            if (data.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-20 text-center">
                        <span class="material-symbols-outlined text-6xl text-gray-200 mb-4">search_off</span>
                        <p class="text-[10px] font-black uppercase tracking-widest text-gray-400">No se encontraron recursos</p>
                    </div>
                `;
                countLabel.textContent = "0 RESULTADOS";
                return;
            }

            grid.innerHTML = data.map((res, index) => {
                const iconMap = {
                    pdf: { icon: 'picture_as_pdf', color: 'text-red-500', bg: 'bg-red-50' },
                    video: { icon: 'play_circle', color: 'text-blue-500', bg: 'bg-blue-50' },
                    ppt: { icon: 'present_to_all', color: 'text-orange-500', bg: 'bg-orange-50' },
                    audio: { icon: 'headphones', color: 'text-purple-500', bg: 'bg-purple-50' },
                    image: { icon: 'image', color: 'text-emerald-500', bg: 'bg-emerald-50' }
                };

                const style = iconMap[res.type] || iconMap.pdf;
                const meta = res.duration || res.file_size || '';

                return `
                    <div class="content-card media-item" style="animation-delay: ${index * 0.05}s">
                        <div class="h-44 ${style.bg} flex items-center justify-center relative border-b border-gray-50">
                            ${meta ? `<span class="absolute top-4 left-4 bg-white/80 backdrop-blur px-2 py-1 rounded-lg text-[8px] font-black uppercase tracking-widest text-gray-500 shadow-sm">${meta}</span>` : ''}
                            <span class="material-symbols-outlined text-7xl ${style.color} opacity-40">${style.icon}</span>
                        </div>
                        <div class="p-8 flex flex-col flex-1">
                            <div class="flex items-center gap-2 mb-3">
                                <span class="text-[8px] font-black uppercase tracking-[0.2em] text-[#fba931]">${res.date_label || 'Reciente'}</span>
                                <span class="h-1 w-1 bg-gray-200 rounded-full"></span>
                                <span class="text-[8px] font-black uppercase tracking-[0.2em] text-gray-300">${res.type}</span>
                            </div>
                            <h3 class="serif text-xl mb-4 leading-tight">${res.title}</h3>
                            <p class="text-[11px] text-gray-400 font-medium leading-relaxed mb-6 line-clamp-3">${res.description || ''}</p>
                            
                            <div class="mt-auto flex justify-between items-center pt-6 border-t border-gray-50">
                                <a href="${res.content_url}" target="_blank" class="flex items-center gap-2 text-[10px] font-black uppercase tracking-widest text-[#0f172a] hover:text-[#fba931] transition-colors">
                                    <span class="material-symbols-outlined text-sm">visibility</span> EXPLORAR
                                </a>
                                <a href="${res.content_url}" download class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center hover:bg-[#fba931] hover:text-white transition-all shadow-sm">
                                    <span class="material-symbols-outlined text-lg">download</span>
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            countLabel.textContent = `MOSTRANDO ${data.length} RECURSO${data.length !== 1 ? 'S' : ''}`;
        }

        // Filtros
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                filterAndRender();
            });
        });

        // Búsqueda
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            filterAndRender();
        });
    </script>
    <script src="/assets/components/navbar.js"></script>
    <script src="/assets/components/footer.js"></script>
</body>

</html>
