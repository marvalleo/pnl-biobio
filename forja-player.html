<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula Virtual - Forja Libertaria</title>
    <link rel="stylesheet" href="/out.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        :root {
            --pnl-blue: #0c1427;
            --pnl-gold: #fba931;
            --pnl-surface: #16213e;
            --pnl-surface-light: #1b2640;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--pnl-blue);
            color: white;
        }

        .serif {
            font-family: 'Playfair Display', serif;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .card-gradient {
            background: linear-gradient(180deg, rgba(12, 20, 39, 0) 0%, rgba(12, 20, 39, 0.9) 100%);
        }

        .heartbeat-dot {
            width: 8px;
            height: 8px;
            background: #fba931;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px #fba931;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(251, 169, 49, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(251, 169, 49, 0);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(251, 169, 49, 0);
            }
        }

        .badge-bronze {
            background: #cd7f32;
            color: white;
        }

        .badge-silver {
            background: #c0c0c0;
            color: #333;
        }

        .badge-gold {
            background: #ffd700;
            color: #0c1427;
        }

        .certificate-btn {
            background: linear-gradient(135deg, #fba931 0%, #d97706 100%);
            box-shadow: 0 4px 15px rgba(251, 169, 49, 0.4);
            animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }

            70% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .aspect-video {
            aspect-ratio: 16 / 9;
            width: 100%;
        }

        /* Scrollbar Premium */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: var(--pnl-blue);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: var(--pnl-surface);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: var(--pnl-gold);
        }
    </style>
</head>

<body class="h-screen flex flex-col md:flex-row overflow-hidden">

    <!-- Sidebar Lecciones -->
    <aside class="w-full md:w-96 bg-[#0c1427] border-r border-white/5 flex flex-col h-full z-10 shadow-2xl overflow-hidden">
        <div class="p-6 border-b border-white/5 flex items-center gap-4 bg-white/5">
            <a href="forja-academia.html"
                class="hover:bg-white/10 p-2 rounded-full transition-colors flex items-center justify-center">
                <span class="material-symbols-outlined text-white">arrow_back</span>
            </a>
            <div class="overflow-hidden">
                <h1 id="course-title" class="font-900 uppercase text-[10px] leading-tight text-gray-400 truncate tracking-widest">
                    Sincronizando...</h1>
                <div class="w-full bg-white/10 h-1.5 rounded-full mt-2">
                    <div id="progress-bar" class="bg-[#fba931] h-full w-0 transition-all duration-1000 shadow-[0_0_10px_#fba931]"></div>
                </div>
                <div class="flex justify-between items-center mt-1">
                    <p id="course-progress-text" class="text-[9px] font-black text-[#fba931] uppercase tracking-widest">
                        0% Completado</p>
                    <div id="attendance-tracking" class="hidden items-center gap-1">
                        <span class="heartbeat-dot"></span>
                        <span id="attendance-time" class="text-[8px] font-black text-gray-500">0 min</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="certificate-container" class="px-6 py-4 bg-amber-500/5 border-b border-white/5 hidden">
            <button onclick="generateCertificate()"
                class="certificate-btn w-full py-3 rounded-xl flex items-center justify-center gap-3 text-[#0f172a] font-900 text-[10px] uppercase tracking-widest transition-all hover:scale-[1.02] active:scale-95">
                <span class="material-symbols-outlined text-sm">military_tech</span>
                Descargar Diploma
            </button>
        </div>

        <div id="lessons-list" class="flex-1 overflow-y-auto p-4 space-y-3 scrollbar-hide bg-[#0c1427]">
            <!-- Skeletons UI -->
            <div class="animate-pulse space-y-4 p-2">
                <div class="h-20 bg-white/5 rounded-2xl flex items-center p-4 gap-4">
                    <div class="w-6 h-6 bg-white/10 rounded-full shrink-0"></div>
                    <div class="flex-1 space-y-2">
                        <div class="h-1.5 bg-white/10 rounded-full w-1/3"></div>
                        <div class="h-2 bg-white/10 rounded-lg w-3/4"></div>
                        <div class="h-1.5 bg-white/5 rounded-full w-1/4 mt-2"></div>
                    </div>
                </div>
                <div class="h-20 bg-slate-100 rounded-2xl flex items-center p-4 gap-4">
                    <div class="w-6 h-6 bg-slate-200 rounded-full shrink-0"></div>
                    <div class="flex-1 space-y-2">
                        <div class="h-2 bg-slate-200 rounded-full w-1/3"></div>
                        <div class="h-3 bg-slate-200 rounded-lg w-2/3"></div>
                        <div class="h-2 bg-slate-200 rounded-full w-1/4 mt-2"></div>
                    </div>
                </div>
                <div class="h-20 bg-slate-100 rounded-2xl flex items-center p-4 gap-4">
                    <div class="w-6 h-6 bg-slate-200 rounded-full shrink-0"></div>
                    <div class="flex-1 space-y-2">
                        <div class="h-2 bg-slate-200 rounded-full w-1/3"></div>
                        <div class="h-3 bg-slate-200 rounded-lg w-5/6"></div>
                        <div class="h-2 bg-slate-200 rounded-full w-1/4 mt-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </aside>

    <!-- Área de Contenido -->
    <main class="flex-1 flex flex-col overflow-y-auto relative bg-[#1e293b] custom-scrollbar">

        <!-- Pantalla de Bienvenida / No Video -->
        <div id="placeholder-overlay" class="flex-1 flex flex-col items-center justify-center p-8 text-center">
            <div
                class="w-24 h-24 bg-[#fba931]/10 border border-[#fba931]/30 rounded-full flex items-center justify-center mb-8 shadow-[0_0_50px_rgba(251,169,49,0.1)]">
                <span class="material-symbols-outlined text-5xl text-[#fba931]">school</span>
            </div>
            <h2 class="serif text-3xl text-[#fba931]">Comienza tu formación</h2>
            <p id="course-desc-ui" class="text-gray-400 text-sm mt-4 uppercase font-bold tracking-widest max-w-sm">
                Selecciona una lección del menú.</p>
        </div>

        <!-- Reproductor de Video -->
        <div id="video-wrapper" class="hidden w-full">
            <div class="bg-black w-full relative flex items-center justify-center shadow-2xl">
                <div id="video-player" class="aspect-video"></div>
            </div>
        </div>

        <!-- Vista de Sesión Live / Presencial -->
        <div id="session-wrapper" class="hidden w-full flex flex-col items-center justify-center p-8 min-h-[60vh]">
            <div id="session-card"
                class="bg-[#0f172a] p-12 rounded-[3rem] border border-white/10 shadow-2xl max-w-2xl w-full text-center">
                <span id="session-badge"
                    class="px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest mb-6 inline-block">--</span>
                <h2 id="session-title-large" class="serif text-4xl text-[#fba931] mb-2">--</h2>
                <p id="session-desc" class="text-gray-400 text-xs font-medium mb-8 max-w-md mx-auto line-clamp-3">--</p>

                <div
                    class="flex flex-col items-center gap-4 text-gray-300 mb-8 bg-white/5 p-6 rounded-3xl border border-white/5">
                    <div class="flex items-center gap-4">
                        <div class="flex items-center gap-2">
                            <span class="material-symbols-outlined text-sm text-[#fba931]">event</span>
                            <span id="session-date" class="text-[10px] font-black uppercase tracking-widest">--</span>
                        </div>
                        <div id="session-loc-container" class="flex items-center gap-2">
                            <span class="material-symbols-outlined text-sm text-[#fba931]">location_on</span>
                            <span id="session-location"
                                class="text-[10px] font-black uppercase tracking-widest">--</span>
                        </div>
                    </div>
                    <div id="session-capacity-info"
                        class="text-[10px] font-black uppercase tracking-[0.2em] text-[#fba931]">
                        Cupos Disponibles: <span id="capacity-count">--</span>
                    </div>
                </div>

                <div id="session-actions" class="flex gap-4 justify-center">
                    <button id="btn-register" onclick="registerToEvent()"
                        class="bg-[#fba931] text-[#0f172a] px-10 py-4 rounded-2xl font-900 text-xs uppercase tracking-widest hover:scale-105 transition-transform">Inscribirse
                        ahora</button>

                    <button id="session-action-link"
                        class="hidden bg-[#fba931] text-[#0f172a] px-10 py-4 rounded-2xl font-900 text-xs uppercase tracking-widest hover:scale-105 transition-transform">Ir
                        a la sesión</button>

                    <button id="session-map-btn" onclick="openMap()"
                        class="bg-white/5 border border-white/10 text-white px-10 py-4 rounded-2xl font-900 text-xs uppercase tracking-widest hover:bg-white/10 transition-colors hidden">Ver
                        Mapa</button>
                </div>

                <p id="registration-status"
                    class="mt-4 text-[9px] font-black uppercase text-green-500 tracking-widest hidden">¡Ya estás
                    inscrito!</p>
            </div>
        </div>

        <!-- Info Footer -->
        <div id="lesson-footer"
            class="hidden bg-[#0c1427] p-8 border-t border-white/5 shadow-2xl relative z-20">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-8">
                <div>
                    <div class="flex items-center gap-3">
                        <span id="lesson-order-badge"
                            class="text-[10px] font-black text-[#fba931] uppercase tracking-[0.2em]">01</span>
                        <span id="delivery-badge"
                            class="text-[8px] font-black bg-white/5 text-gray-400 px-3 py-1 rounded-full uppercase">Grabado</span>
                    </div>
                    <h2 id="lesson-title-footer"
                        class="text-2xl font-900 uppercase mt-2 tracking-tighter text-white">Introducción</h2>
                    <p id="lesson-desc-footer" class="text-xs text-gray-500 font-medium mt-2 max-w-xl">--</p>
                </div>
                <div class="flex gap-4 w-full md:w-auto">
                    <button onclick="toggleCompletion()" id="btn-complete"
                        class="flex-1 md:flex-none px-8 py-4 rounded-2xl font-900 text-xs uppercase tracking-widest transition-all flex items-center justify-center gap-3 active:scale-95">
                        <span class="material-symbols-outlined text-xl">check_circle</span>
                        <span id="btn-text">Cargando...</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="supabase-config.js"></script>
    <script type="module" src="/shared.js"></script>
    <script>
        let currentLessons = [];
        let completedLessonIds = new Set();
        let registrations = new Set();
        let currentLessonIndex = -1;
        let profileId = null;
        let currentCourseId = localStorage.getItem('current_course_id');
        let heartbeatInterval = null;
        let ytPlayer = null;
        let videoProgressInterval = null;

        function getYoutubeID(url) {
            if (!url) return null;
            if (url.length === 11) return url; // Es ya un ID
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        window.onYouTubeIframeAPIReady = () => { 
            console.log("📺 PNL Biobio: YouTube Player API Ready"); 
            window.isYTReady = true;
        };

        // Carga dinámica de la API para asegurar que los callbacks estén listos
        function loadYoutubeAPI() {
            if (window.isYTAPIRequested) return;
            console.log("📺 PNL Biobio: Cargando YouTube IFrame API...");
            const tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            window.isYTAPIRequested = true;
            const firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
        }

        window.addEventListener('DOMContentLoaded', async () => {
            if (!window.isSupabaseInit) {
                showToast("Error de inicialización del aula virtual.", "error");
                return;
            }

            if (!currentCourseId) {
                window.location.href = 'forja-academia.html';
                return;
            }

            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.href = 'forja-login.html'; return; }

            // Usar cache de sesión si existe
            let profile = JSON.parse(sessionStorage.getItem('pnl_profile'));
            if (!profile) {
                const { data } = await supabaseClient.from('profiles').select('id, role').eq('auth_id', user.id).single();
                profile = data;
                if (profile) sessionStorage.setItem('pnl_profile', JSON.stringify(profile));
            }

            if (!profile) {
                showToast("Error: Perfil no encontrado.", 'error');
                return;
            }
            profileId = profile.id;

            await Promise.all([loadCourse(), loadLessons(), loadRegistrations()]);
            loadYoutubeAPI();
        });

        async function loadCourse() {
            const { data } = await supabaseClient.from('courses').select('*').eq('id', currentCourseId).single();
            if (data) {
                document.getElementById('course-title').textContent = data.title;
                document.getElementById('course-desc-ui').textContent = data.description || 'Selecciona una lección del menú para visualizar el contenido.';
            }
        }

        async function loadRegistrations() {
            const { data } = await supabaseClient.from('lesson_registrations').select('lesson_id').eq('profile_id', profileId);
            registrations = new Set(data.map(r => r.lesson_id));
        }

        async function loadLessons() {
            try {
                const { data: lessons, error } = await supabaseClient
                    .from('lessons')
                    .select('*')
                    .eq('course_id', currentCourseId)
                    .order('order', { ascending: true });

                if (error) throw error;
                currentLessons = lessons || [];

                const { data: progress, error: progError } = await supabaseClient
                    .from('user_progress')
                    .select('lesson_id, minutes_watched, last_video_second, is_completed')
                    .eq('profile_id', profileId);

                if (progError) {
                    console.warn("Error cargando progreso (posible tabla incompleta):", progError);
                }

                // Store progress maps
                window.lessonProgressMap = {};
                window.videoSecondsMap = {};

                if (progress) {
                    progress.forEach(p => {
                        window.lessonProgressMap[p.lesson_id] = p.minutes_watched || 0;
                        window.videoSecondsMap[p.lesson_id] = p.last_video_second || 0;
                    });
                    completedLessonIds = new Set(progress.filter(p => (p.is_completed || false)).map(p => p.lesson_id));
                }

                renderLessons();
                updateProgress();

                // Auto-seleccionar primera lección si hay disponibles y ninguna activa
                if (currentLessons.length > 0 && currentLessonIndex === -1) {
                    selectLesson(0);
                }
            } catch (err) { console.error(err); }
        }

        function renderLessons() {
            const container = document.getElementById('lessons-list');
            if (currentLessons.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-400 py-10 text-[10px] uppercase font-black">Sin contenido disponible.</p>';
                return;
            }

            container.innerHTML = currentLessons.map((lesson, index) => {
                const isCompleted = completedLessonIds.has(lesson.id);
                const isActive = index === currentLessonIndex;

                // Malla Curricular Visual (Badge por título de curso)
                const courseTitle = document.getElementById('course-title').textContent.toLowerCase();
                let levelBadge = '';
                if (courseTitle.includes('bronce')) levelBadge = '<span class="px-2 py-0.5 rounded text-[7px] font-black uppercase tracking-widest badge-bronze">Bronce</span>';
                else if (courseTitle.includes('plata')) levelBadge = '<span class="px-2 py-0.5 rounded text-[7px] font-black uppercase tracking-widest badge-silver">Plata</span>';
                else if (courseTitle.includes('oro')) levelBadge = '<span class="px-2 py-0.5 rounded text-[7px] font-black uppercase tracking-widest badge-gold">Oro</span>';

                return `
                    <div onclick="selectLesson(${index})" 
                         class="cursor-pointer p-5 rounded-2xl transition-all border-2 ${isActive ? 'bg-white/5 border-[#fba931] shadow-[0_10px_30px_rgba(251,169,49,0.05)]' : 'bg-white/2 border-transparent hover:bg-white/5 group'}">
                        <div class="flex items-center gap-4">
                            <span class="material-symbols-outlined text-xl ${isCompleted ? 'text-green-500' : 'text-white/10 group-hover:text-white/30'}">
                                ${isCompleted ? 'check_circle' : 'radio_button_unchecked'}
                            </span>
                            <div class="flex-1 overflow-hidden">
                                <div class="flex items-center justify-between gap-2 mb-1">
                                    <p class="text-[8px] font-black ${isActive ? 'text-[#fba931]' : 'text-gray-500'} uppercase tracking-[0.2em]">Lección ${lesson.order}</p>
                                    ${levelBadge}
                                </div>
                                <h3 class="font-800 text-[11px] uppercase leading-tight truncate transition-colors ${isActive ? 'text-white' : 'text-gray-400 group-hover:text-white'}">
                                    ${lesson.title}
                                </h3>
                                <div class="flex gap-4 mt-2 items-center opacity-60">
                                    <span class="text-[8px] font-black text-gray-400 uppercase tracking-widest bg-white/5 px-2 py-0.5 rounded">${lesson.delivery_type === 'recorded' ? '🎥' : lesson.delivery_type === 'live' ? '📡' : '🏛️'}</span>
                                    <span class="text-[8px] font-black text-gray-400 uppercase tracking-widest">${lesson.duration || '--'}</span>
                                    ${window.lessonProgressMap && window.lessonProgressMap[lesson.id] > 0 ? `<span class="text-[8px] font-black text-[#fba931] uppercase bg-amber-500/10 px-2 py-0.5 rounded">${window.lessonProgressMap[lesson.id]} min</span>` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateProgress() {
            const percent = Math.round((completedLessonIds.size / currentLessons.length) * 100) || 0;
            const bar = document.getElementById('progress-bar');
            if (bar) bar.style.width = `${percent}%`;
            const text = document.getElementById('course-progress-text');
            if (text) text.textContent = `${percent}% Completado`;

            // Mostrar botón de certificado si está al 100%
            const certBox = document.getElementById('certificate-container');
            if (percent >= 100) {
                certBox.classList.remove('hidden');
            } else {
                certBox.classList.add('hidden');
            }
        }

        async function selectLesson(index) {
            console.log(`☝️ PNL Biobio: Seleccionando lección índice ${index}`);
            try {
                // Reset scroll
                const mainArea = document.querySelector('main.flex-1');
                if (mainArea) mainArea.scrollTop = 0;

                if (!currentLessons || !currentLessons[index]) {
                    console.error("❌ PNL Biobio: Lección no encontrada.");
                    return;
                }
                currentLessonIndex = index;
                const lesson = currentLessons[index];
                const isCompleted = completedLessonIds.has(lesson.id);
                
                // UI Cleanup
                document.getElementById('placeholder-overlay')?.classList.add('hidden');
                document.getElementById('video-wrapper')?.classList.add('hidden');
                document.getElementById('session-wrapper')?.classList.add('hidden');
                document.getElementById('lesson-footer')?.classList.remove('hidden');

                // Footer Info
                document.getElementById('lesson-order-badge').textContent = lesson.order.toString().padStart(2, '0');
                document.getElementById('lesson-title-footer').textContent = lesson.title;
                document.getElementById('lesson-desc-footer').textContent = lesson.description || 'Sin descripción adicional.';
                
                const deliveryLabels = { recorded: 'Grabado', live: 'En Vivo', in_person: 'Presencial' };
                document.getElementById('delivery-badge').textContent = deliveryLabels[lesson.delivery_type] || lesson.delivery_type;

                if (lesson.delivery_type === 'recorded') {
                    document.getElementById('video-wrapper')?.classList.remove('hidden');
                    const ytId = getYoutubeID(lesson.content_url);
                    const startTime = window.videoSecondsMap[lesson.id] || 0;

                    if (ytId) {
                        await initYoutubePlayer(ytId, startTime);
                    } else if (lesson.content_url) {
                        const videoContainer = document.getElementById('video-player');
                        if (videoContainer) {
                            videoContainer.innerHTML = `<iframe class="w-full h-full aspect-video" src="${lesson.content_url}" frameborder="0" allowfullscreen></iframe>`;
                        }
                    }
                    startAttendanceHeartbeat(lesson.id);
                } else {
                    stopAttendanceHeartbeat();
                    document.getElementById('session-wrapper')?.classList.remove('hidden');
                    document.getElementById('session-title-large').textContent = lesson.title;
                    document.getElementById('session-desc').textContent = lesson.description || 'Esta sesión se llevará a cabo según la fecha programada.';
                    
                    const badge = document.getElementById('session-badge');
                    badge.textContent = deliveryLabels[lesson.delivery_type];
                    badge.className = `px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest mb-6 inline-block ${lesson.delivery_type === 'live' ? 'bg-red-600 animate-pulse' : 'bg-white text-black'}`;

                    const dateObj = lesson.event_date || lesson.scheduled_at;
                    const dateStr = dateObj ? new Date(dateObj).toLocaleString('es-CL', { weekday: 'long', day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit' }) : 'Fecha por confirmar';
                    document.getElementById('session-date').textContent = dateStr;

                    const capInfo = document.getElementById('session-capacity-info');
                    if (lesson.max_capacity > 0) {
                        capInfo?.classList.remove('hidden');
                        const { count } = await supabaseClient.from('lesson_registrations').select('*', { count: 'exact', head: true }).eq('lesson_id', lesson.id);
                        const countEl = document.getElementById('capacity-count');
                        if (countEl) countEl.textContent = `${count} / ${lesson.max_capacity}`;
                    } else {
                        capInfo?.classList.add('hidden');
                    }
                }

                updateButtonUI(isCompleted);
                renderLessons();
            } catch (err) {
                console.error("❌ PNL Biobio: Error fatal en selectLesson:", err);
            }
        }

        async function registerToEvent() {
            const lesson = currentLessons[currentLessonIndex];
            try {
                const { error } = await supabaseClient.from('lesson_registrations').insert([{ profile_id: profileId, lesson_id: lesson.id }]);
                if (error) {
                    if (error.code === '23505') showToast("Ya estás inscrito en este evento.", 'info');
                    else throw error;
                } else {
                    showToast("¡Te has inscrito con éxito!", 'success');
                    registrations.add(lesson.id);
                    selectLesson(currentLessonIndex); // Refresh UI
                }
            } catch (err) { showToast("Error al inscribirse: " + err.message, 'error'); }
        }

        function startAttendanceHeartbeat(lessonId) {
            stopAttendanceHeartbeat();
            const tracking = document.getElementById('attendance-tracking');
            const timeDisplay = document.getElementById('attendance-time');
            tracking.classList.remove('flex');
            tracking.classList.add('hidden');

            let minutes = window.lessonProgressMap[lessonId] || 0;
            timeDisplay.textContent = `${minutes} min`;

            heartbeatInterval = setInterval(async () => {
                minutes++;
                timeDisplay.textContent = `${minutes} min`;
                tracking.classList.remove('hidden');
                tracking.classList.add('flex');

                window.lessonProgressMap[lessonId] = minutes;

                // Sync with DB
                try {
                    const currentSec = (ytPlayer && typeof ytPlayer.getCurrentTime === 'function') ? Math.floor(ytPlayer.getCurrentTime()) : (window.videoSecondsMap[lessonId] || 0);

                    const { data: currentProg } = await supabaseClient.from('user_progress').select('id').match({ profile_id: profileId, lesson_id: lessonId }).single();
                    if (currentProg) {
                        await supabaseClient.from('user_progress').update({
                            minutes_watched: minutes,
                            last_heartbeat: new Date().toISOString(),
                            last_video_second: currentSec
                        }).eq('id', currentProg.id);
                    } else {
                        await supabaseClient.from('user_progress').insert([{
                            profile_id: profileId,
                            lesson_id: lessonId,
                            minutes_watched: minutes,
                            last_video_second: currentSec,
                            is_completed: false
                        }]);
                    }
                } catch (e) { console.error("Heartbeat sync error", e); }
            }, 60000); // Cada 1 minuto
        }

        function stopAttendanceHeartbeat() {
            if (heartbeatInterval) clearInterval(heartbeatInterval);
            if (videoProgressInterval) clearInterval(videoProgressInterval);
            if (ytPlayer && typeof ytPlayer.destroy === 'function') {
                ytPlayer.destroy();
                ytPlayer = null;
            }
        }

        async function initYoutubePlayer(videoId, startTime) {
            console.log(`🎬 PNL Biobio: Preparando reproductor para ID: ${videoId}`);
            
            let container = document.getElementById('video-player');
            if (!container) {
                const wrapper = document.querySelector('#video-wrapper .bg-black');
                if (wrapper) {
                    wrapper.innerHTML = '<div id="video-player" class="aspect-video"></div>';
                    container = document.getElementById('video-player');
                }
            }
            if (!container) return;

            // Paso 1: Crear el Iframe por HTML (Método robusto de plibchile.cl)
            const origin = encodeURIComponent(window.location.origin);
            const iframeId = `yt-iframe-${Date.now()}`;
            const iframeUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&start=${startTime}&rel=0&playsinline=1&enablejsapi=1&origin=${origin}&modestbranding=1&controls=1`;
            
            container.innerHTML = `<iframe id="${iframeId}" class="w-full h-full aspect-video" src="${iframeUrl}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>`;
            
            // Paso 2: Vincular API para seguimiento (Opcional, no bloqueante)
            if (window.isYTReady && typeof YT !== 'undefined' && YT.Player) {
                try {
                    console.log("🔗 PNL Biobio: Vinculando API de seguimiento al iframe...");
                    if (ytPlayer && typeof ytPlayer.destroy === 'function') ytPlayer.destroy();
                    
                    ytPlayer = new YT.Player(iframeId, {
                        events: {
                            'onReady': () => console.log("✅ PNL Biobio: Seguimiento vinculado."),
                            'onStateChange': (event) => {
                                if (event.data === YT.PlayerState.PLAYING) {
                                    startVideoProgressSync();
                                } else if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.ENDED) {
                                    stopVideoProgressSync();
                                    saveVideoSeconds();
                                }
                            },
                            'onError': (e) => console.error("❌ PNL Biobio: Error de API en el iframe:", e.data)
                        }
                    });
                } catch (e) {
                    console.warn("⚠️ PNL Biobio: No se pudo activar el seguimiento automático:", e);
                }
            } else {
                console.log("ℹ️ PNL Biobio: API de YouTube no lista, el video se reproducirá sin seguimiento automático por ahora.");
            }
        }

        function startVideoProgressSync() {
            if (videoProgressInterval) clearInterval(videoProgressInterval);
            videoProgressInterval = setInterval(saveVideoSeconds, 30000); // Guardar cada 30 segundos de reproducción
        }

        function stopVideoProgressSync() {
            if (videoProgressInterval) clearInterval(videoProgressInterval);
        }

        async function saveVideoSeconds() {
            if (!ytPlayer || typeof ytPlayer.getCurrentTime !== 'function' || currentLessonIndex === -1) return;

            const lessonId = currentLessons[currentLessonIndex].id;
            const currentSec = Math.floor(ytPlayer.getCurrentTime());
            window.videoSecondsMap[lessonId] = currentSec;

            try {
                const { data: currentProg } = await supabaseClient.from('user_progress').select('id').match({ profile_id: profileId, lesson_id: lessonId }).single();
                
                const updateData = { last_video_second: currentSec };
                
                if (currentProg) {
                    await supabaseClient.from('user_progress').update(updateData).eq('id', currentProg.id);
                } else {
                    await supabaseClient.from('user_progress').insert([{ profile_id: profileId, lesson_id: lessonId, ...updateData, is_completed: false }]);
                }
            } catch (e) { 
                console.warn("Error guardando segundos de video (¿Tabla incompleta?):", e); 
            }
        }


        function updateButtonUI(isCompleted) {
            const btn = document.getElementById('btn-complete');
            const btnText = document.getElementById('btn-text');
            if (isCompleted) {
                btn.className = "flex-1 md:flex-none bg-green-500/10 text-green-500 border border-green-500/20 px-8 py-4 rounded-2xl font-900 text-xs uppercase tracking-widest transition-all flex items-center justify-center gap-3";
                btnText.textContent = "Completada";
            } else {
                btn.className = "flex-1 md:flex-none bg-white/5 text-gray-400 border border-white/5 px-8 py-4 rounded-2xl font-900 text-xs uppercase tracking-widest hover:bg-white/10 hover:text-white transition-all flex items-center justify-center gap-3 active:scale-95 text-glow";
                btnText.textContent = "Marcar como Completada";
            }
        }

        async function toggleCompletion() {
            if (currentLessonIndex === -1) return;
            const lesson = currentLessons[currentLessonIndex];
            const isCompleted = completedLessonIds.has(lesson.id);

            try {
                if (isCompleted) {
                    // Update only completion status, keep minutes
                    await supabaseClient.from('user_progress').update({ is_completed: false }).match({ profile_id: profileId, lesson_id: lesson.id });
                    completedLessonIds.delete(lesson.id);
                } else {
                    const { data: exists } = await supabaseClient.from('user_progress').select('id').match({ profile_id: profileId, lesson_id: lesson.id }).single();
                    if (exists) {
                        await supabaseClient.from('user_progress').update({ is_completed: true }).eq('id', exists.id);
                    } else {
                        await supabaseClient.from('user_progress').insert([{ profile_id: profileId, lesson_id: lesson.id, is_completed: true }]);
                    }
                    completedLessonIds.add(lesson.id);
                }
                updateButtonUI(!isCompleted);
                updateProgress();
                renderLessons();
            } catch (err) { console.error(err); }
        }

        function openMap() {
            const lesson = currentLessons[currentLessonIndex];
            if (lesson && lesson.location) {
                window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(lesson.location)}`, '_blank');
            }
        }

            const profile = JSON.parse(sessionStorage.getItem('pnl_profile'));
            const studentName = (profile?.full_name || 'Militante Libertario').toUpperCase();

            showToast("Generando tu diploma premium...", "info");

            // Crear un contenedor temporal para el renderizado
            const certDiv = document.createElement('div');
            certDiv.style.width = '1200px';
            certDiv.style.height = '850px';
            certDiv.style.position = 'fixed';
            certDiv.style.top = '-5000px';
            certDiv.style.left = '-5000px';
            certDiv.style.background = '#fff';
            certDiv.style.fontFamily = 'Montserrat, sans-serif';
            certDiv.innerHTML = `
                <div style="width: 100%; height: 100%; border: 40px solid #0f172a; padding: 60px; box-sizing: border-box; position: relative;">
                    <div style="position: absolute; top: 0; right: 0; width: 300px; height: 300px; background: #fba931; clip-path: polygon(100% 0, 0 0, 100% 100%); opacity: 0.1;"></div>
                    <div style="position: absolute; bottom: 0; left: 0; width: 300px; height: 300px; background: #0f172a; clip-path: polygon(0 100%, 0 0, 100% 100%); opacity: 0.05;"></div>
                    
                    <div style="text-align: center; border: 4px solid #fba931; height: 100%; padding: 40px; box-sizing: border-box;">
                        <img src="/assets/images/logos/pnl-del-biobio01.png" style="height: 120px; margin-bottom: 20px;">
                        
                        <h1 style="font-size: 24px; font-weight: 900; color: #0f172a; margin: 0; text-transform: uppercase; letter-spacing: 5px;">Certificado de Excelencia</h1>
                        <p style="font-size: 14px; font-weight: 700; color: #fba931; text-transform: uppercase; margin-bottom: 40px;">Academia Forja Libertaria - Sede Regional Biobío</p>
                        
                        <p style="font-size: 18px; color: #666;">Por cuanto ha demostrado dedicación y compromiso con los ideales de libertad,</p>
                        <p style="font-size: 18px; color: #666; margin-bottom: 30px;">se otorga el presente diploma a:</p>
                        
                        <h2 style="font-size: 48px; font-weight: 900; color: #0f172a; margin: 0 0 10px 0; font-family: 'Playfair Display', serif;">${studentName}</h2>
                        <div style="width: 400px; height: 2px; background: #fba931; margin: 0 auto 40px auto;"></div>
                        
                        <p style="font-size: 18px; color: #666;">Por completar satisfactoriamente el programa de formación académica:</p>
                        <h3 style="font-size: 28px; font-weight: 800; color: #0f172a; text-transform: uppercase;">${courseTitle}</h3>
                        
                        <div style="margin-top: 60px; display: flex; justify-content: space-around; align-items: flex-end;">
                            <div style="text-align: center;">
                                <div style="width: 200px; border-bottom: 1px solid #ccc; margin-bottom: 10px;"></div>
                                <p style="font-size: 10px; font-weight: 900; color: #0f172a; text-transform: uppercase;">Directiva Regional</p>
                            </div>
                            <div style="text-align: center;">
                                <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=CERT-${Date.now()}" style="height: 80px; margin-bottom: 10px;">
                                <p style="font-size: 8px; color: #999;">VALIDACIÓN DIGITAL</p>
                            </div>
                        </div>
                        
                        <p style="position: absolute; bottom: 80px; font-size: 12px; color: #999; left: 0; right: 0; text-align: center;">Fecha de emisión: ${new Date().toLocaleDateString('es-CL')}</p>
                    </div>
                </div>
            `;

            document.body.appendChild(certDiv);

            try {
                const canvas = await html2canvas(certDiv, { scale: 2 });
                const imgData = canvas.toDataURL('image/png');

                const pdf = new jsPDF('l', 'px', [1200, 850]);
                pdf.addImage(imgData, 'PNG', 0, 0, 1200, 850);
                pdf.save(`DIPLOMA-PNL-${studentName.replace(/\s+/g, '-')}.pdf`);

                showToast("¡Diploma descargado! Felicitaciones.", "success");
            } catch (err) {
                console.error("Error PDF:", err);
                showToast("Error al generar el PDF.", "error");
            } finally {
                certDiv.remove();
            }
        }
    </script>
