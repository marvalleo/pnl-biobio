<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Establecer Contraseña - Forja Libertaria</title>
    <link rel="stylesheet" href="/out.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --pnl-blue: #0f172a;
            --pnl-gold: #fba931;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--pnl-blue);
            color: var(--pnl-blue);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-3xl p-8 shadow-2xl text-center border-t-8 border-[#fba931] mx-auto">
        <img src="/assets/images/logos/pnl-del-biobio01.png" alt="Logo PNL" class="h-20 mx-auto mb-6">
        <h1 class="text-2xl font-900 uppercase mb-2 tracking-tighter">Establecer Contraseña</h1>
        <p class="text-gray-400 text-[10px] font-bold uppercase tracking-widest mb-8">Seguridad de tu Cuenta</p>

        <div id="reset-container" class="space-y-4 text-left hidden">
            <!-- Mensaje Feedback -->
            <div id="feedback-message" class="hidden p-4 mb-4 rounded-lg bg-red-50 border-l-4 border-red-500">
                <p class="text-red-800 text-xs font-bold uppercase tracking-wider feedback-text"></p>
            </div>

            <div class="relative group">
                <label class="text-[10px] font-black uppercase text-gray-400 ml-1">Nueva Contraseña</label>
                <div class="relative">
                    <input type="password" id="new-password" placeholder="Mínimo 6 caracteres"
                        class="w-full bg-gray-50 border border-gray-100 p-4 rounded-xl focus:ring-2 focus:ring-[#fba931] outline-none transition-all font-bold text-lg pr-12">
                    <button type="button" onclick="toggleVisibility('new-password', 'eye-new')" 
                        class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-[#fba931] transition-colors p-1 flex items-center justify-center">
                        <svg id="eye-new" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path class="eye-path" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path class="eye-body" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
            </div>

            <div class="relative group">
                <label class="text-[10px] font-black uppercase text-gray-400 ml-1">Confirmar Contraseña</label>
                <div class="relative">
                    <input type="password" id="confirm-password" placeholder="Repite tu contraseña"
                        class="w-full bg-gray-50 border border-gray-100 p-4 rounded-xl focus:ring-2 focus:ring-[#fba931] outline-none transition-all font-bold text-lg pr-12">
                    <button type="button" onclick="toggleVisibility('confirm-password', 'eye-confirm')" 
                        class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-[#fba931] transition-colors p-1 flex items-center justify-center">
                        <svg id="eye-confirm" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path class="eye-path" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path class="eye-body" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
            </div>

            <button onclick="handleUpdatePassword()"
                class="w-full bg-[#fba931] text-[#0f172a] py-4 rounded-xl font-900 uppercase tracking-widest hover:brightness-110 active:scale-[0.98] transition-all shadow-lg">
                Guardar y Entrar
            </button>
        </div>

        <!-- Estado de Carga / Error de Token -->
        <div id="loading-state" class="py-10">
            <div class="animate-spin h-8 w-8 border-4 border-[#0f172a] border-t-transparent rounded-full mx-auto mb-4">
            </div>
            <p class="text-xs font-bold uppercase text-gray-400">Verificando enlace de seguridad...</p>
        </div>

        <div id="token-error" class="hidden py-6">
            <p class="text-red-500 font-bold uppercase text-sm mb-4">El enlace es inválido o ha expirado.</p>
            <a href="forja-activar.html"
                class="bg-gray-100 px-6 py-3 rounded-xl font-bold uppercase text-xs hover:bg-gray-200">Solicitar nuevo
                enlace</a>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="supabase-config.js"></script>

    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            // Supabase maneja el hash de la URL (#access_token=...) automáticamente
            // y establece la sesión. Verificamos si hay sesión activa.

            // Pequeño delay para que el cliente procese el hash
            setTimeout(async () => {
                const { data: { session }, error } = await supabaseClient.auth.getSession();

                document.getElementById('loading-state').classList.add('hidden');

                if (session) {
                    // Token válido, mostrar formulario
                    document.getElementById('reset-container').classList.remove('hidden');
                    console.log("Sesión recuperada para reset password:", session.user.email);
                } else {
                    // Token inválido o expirado
                    document.getElementById('token-error').classList.remove('hidden');
                }
            }, 1000);

            // Escuchar cambios de estado por si acaso (Magic Link flow)
            supabaseClient.auth.onAuthStateChange((event, session) => {
                if (event === 'PASSWORD_RECOVERY') {
                    document.getElementById('loading-state').classList.add('hidden');
                    document.getElementById('reset-container').classList.remove('hidden');
                    document.getElementById('token-error').classList.add('hidden');
                }
            });
        });

        async function handleUpdatePassword() {
            if (!window.isSupabaseInit) {
                showError('Conectando con la base de datos... Por favor, intenta de nuevo.');
                return;
            }
            const newPass = document.getElementById('new-password').value.trim();
            const confirmPass = document.getElementById('confirm-password').value.trim();
            const btn = document.querySelector('button');
            const feedbackBox = document.getElementById('feedback-message');
            const feedbackText = feedbackBox.querySelector('.feedback-text');

            feedbackBox.classList.add('hidden');

            if (newPass.length < 6) {
                showError('La contraseña debe tener al menos 6 caracteres.');
                return;
            }
            if (newPass !== confirmPass) {
                showError('Las contraseñas no coinciden.');
                return;
            }

            // UI Loading
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Guardando...';

            try {
                const { data, error } = await supabaseClient.auth.updateUser({
                    password: newPass
                });

                if (error) throw error;

                // Buscar perfil para saber a dónde redirigir después
                const { data: { user } } = await supabaseClient.auth.getUser();
                const { data: profile } = await supabaseClient
                    .from('profiles')
                    .select('role')
                    .eq('auth_id', user?.id)
                    .single();

                // Actualizar también el flag de must_change_password si existía
                if (user) {
                    await supabaseClient.from('profiles').update({ must_change_password: false }).eq('auth_id', user.id);
                }

                // 3. ÉXITO VISUAL (Pensando en el abuelo y la tranquilidad del usuario)
                const container = document.getElementById('reset-container');
                const mainWrapper = container.parentElement;

                mainWrapper.innerHTML = `
                    <div class="text-center p-8 animate-fade-in">
                        <div class="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg border-4 border-white">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                            </svg>
                        </div>
                        <h2 class="text-2xl font-black text-[#0f172a] mb-2 uppercase tracking-tight">¡Clave Guardada!</h2>
                        <p class="text-slate-600 mb-8 text-sm">Tu contraseña ha sido actualizada con éxito. Ya puedes entrar a la plataforma.</p>
                        
                        <div class="animate-pulse text-[#fba931] font-bold text-xs uppercase tracking-widest">
                            Redirigiendo a tu panel...
                        </div>
                    </div>
                `;

                // Redirigir al inicio o academia después de 2 segundos de paz
                setTimeout(() => {
                    const redirectUrl = (profile && ['super_admin', 'admin_forja', 'admin_votos'].includes(profile.role))
                        ? 'admin-dashboard.html'
                        : 'forja-academia.html';
                    window.location.href = redirectUrl;
                }, 2500);

            } catch (err) {
                console.error(err);
                showError(err.message);
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }

        function showError(msg) {
            const box = document.getElementById('feedback-message');
            const text = box.querySelector('.feedback-text');
            box.classList.remove('hidden');
            text.textContent = msg;
        }

        function toggleVisibility(inputId, svgId) {
            const input = document.getElementById(inputId);
            const svg = document.getElementById(svgId);
            const eyePath = svg.querySelector('.eye-path');
            const eyeBody = svg.querySelector('.eye-body');
            
            if (input.type === 'password') {
                input.type = 'text';
                eyePath.setAttribute('d', 'M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878l-3.42-3.42M21 21l-3.42-3.42m-1.58-1.58L12 12m-2.58-2.58l-3.42-3.42m14.542 1.942A11.026 11.026 0 0012 5c-4.478 0-8.268 2.943-9.543 7a4.902 4.902 0 001.373 2.128');
                eyeBody.setAttribute('style', 'display:none');
            } else {
                input.type = 'password';
                eyePath.setAttribute('d', 'M15 12a3 3 0 11-6 0 3 3 0 016 0z');
                eyeBody.setAttribute('style', 'display:block');
                eyeBody.setAttribute('d', 'M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z');
            }
        }
    </script>
</body>

</html>
