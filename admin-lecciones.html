<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Forja - Gestión de Lecciones</title>
    <link rel="stylesheet" href="/out.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root {
            --pnl-blue: #0f172a;
            --pnl-gold: #fba931;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f3f4f6;
            color: var(--pnl-blue);
        }
    </style>
</head>

<body class="min-h-screen">
    <nav
        class="bg-white shadow-md border-b-4 border-[#fba931] px-6 py-1 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-6">
            <a href="admin-forja.html" class="flex items-center gap-3 hover:opacity-80 transition-all group">
                <img loading="lazy" src="/assets/images/logos/pnl-del-biobio01.webp" alt="Logo PNL" style="max-height: 70px;">
                <div class="flex flex-col text-left">
                    <span class="text-[11px] font-black uppercase text-[#fba931] leading-none mb-1">Volver a Forja</span>
                    <span class="font-black text-lg uppercase leading-none">Gestión Lecciones</span>
                </div>
            </a>

            <div class="h-8 w-[1px] bg-gray-200 hidden md:block"></div>

            <div class="hidden md:flex items-center gap-4">
                <a href="admin-dashboard.html"
                    class="flex items-center gap-1.5 text-[11px] font-black uppercase text-gray-600 hover:text-[#0f172a] transition-colors">
                    <span class="material-symbols-outlined text-lg">dashboard</span> Panel Central
                </a>
                <a href="forja-academia.html" target="_blank"
                    class="flex items-center gap-1.5 text-[11px] font-black uppercase text-gray-600 hover:text-blue-600 transition-colors">
                    <span class="material-symbols-outlined text-lg">visibility</span> Vista Usuario
                </a>
            </div>
        </div>

        <div id="user-menu-container" class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-full bg-gray-100 animate-pulse"></div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <div class="flex justify-between items-center mb-8">
            <div>
                <p id="section-subtitle" class="text-[11px] font-black uppercase text-[#fba931] tracking-widest">Gestión
                    de Contenido</p>
                <h1 id="course-name" class="text-3xl font-900 uppercase text-[#0f172a]">Lecciones del Curso</h1>
            </div>
            <div class="flex gap-3">
                <button id="btn-final-exam" onclick="openQuizBuilder(null)"
                    class="bg-white border-2 border-[#fba931] text-[#fba931] px-6 py-3 rounded-xl font-900 text-xs uppercase tracking-widest hover:bg-[#fba931] hover:text-white flex items-center gap-2 transition-all">
                    <span class="material-symbols-outlined">quiz</span>
                    <span id="btn-final-exam-text">Examen Final del Curso</span>
                </button>
                <button id="btn-new-item" onclick="openModal()"
                    class="bg-[#fba931] text-[#0f172a] px-6 py-3 rounded-xl font-900 text-xs uppercase tracking-widest shadow-lg hover:brightness-110 flex items-center gap-2 transition-all">
                    <span class="material-symbols-outlined">add</span> Nueva Lección
                </button>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b border-gray-100">
                    <tr>
                        <th class="p-6 text-[11px] font-black uppercase text-gray-600 tracking-wider text-center">Orden
                        </th>
                        <th class="p-6 text-[11px] font-black uppercase text-gray-600 tracking-wider">Título</th>
                        <th class="p-6 text-[11px] font-black uppercase text-gray-600 tracking-wider">Tipo</th>
                        <th class="p-6 text-[11px] font-black uppercase text-gray-600 tracking-wider">Programación</th>
                        <th class="p-6 text-[11px] font-black uppercase text-gray-600 tracking-wider text-center">Cupos
                        </th>
                        <th class="p-6 text-[11px] font-black uppercase text-gray-600 tracking-wider text-right">
                            Acciones</th>
                    </tr>
                </thead>
                <tbody id="lesson-table-body" class="divide-y divide-gray-100">
                    <tr>
                        <td colspan="10" class="p-8">
                            <div class="animate-pulse flex flex-col gap-4">
                                <div class="h-10 bg-slate-100 rounded-xl w-full"></div>
                                <div class="h-10 bg-slate-100 rounded-xl w-full"></div>
                                <div class="h-10 bg-slate-100 rounded-xl w-full"></div>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal Nueva/Editar Lección -->
    <div id="lesson-modal"
        class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center backdrop-blur-sm overflow-y-auto pt-10 pb-10">
        <div class="bg-white rounded-3xl p-8 max-w-2xl w-full shadow-2xl mx-4">
            <h2 id="modal-title" class="text-2xl font-900 uppercase mb-6 text-[#0f172a]">Detalle de Lección</h2>
            <form id="lesson-form" onsubmit="saveLesson(event)" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="hidden" id="lesson-id">

                <div class="md:col-span-2">
                    <label class="text-[11px] font-black uppercase text-gray-600 ml-1">Título</label>
                    <input type="text" id="lesson-title" required
                        class="w-full bg-gray-50 border border-gray-100 p-4 rounded-xl focus:ring-2 focus:ring-[#fba931] outline-none">
                </div>

                <div class="md:col-span-2">
                    <label class="text-[11px] font-black uppercase text-gray-600 ml-1">Descripción corta</label>
                    <textarea id="lesson-desc"
                        class="w-full bg-gray-50 border border-gray-100 p-4 rounded-xl focus:ring-2 focus:ring-[#fba931] outline-none h-24"></textarea>
                </div>

                <div>
                    <label class="text-[11px] font-black uppercase text-gray-600 ml-1">Tipo de Entrega</label>
                    <select id="lesson-type" required onchange="toggleFields()"
                        class="w-full bg-gray-50 border border-gray-100 p-4 rounded-xl focus:ring-2 focus:ring-[#fba931] outline-none font-bold">
                        <option value="recorded">🎥 Grabado (Video)</option>
                        <option value="live">📡 En Vivo (Online)</option>
                        <option value="in_person">🏛️ Presencial</option>
                    </select>
                </div>

                <div>
                    <label class="text-[11px] font-black uppercase text-gray-600 ml-1">Orden (N°)</label>
                    <input type="number" id="lesson-order" value="1"
                        class="w-full bg-gray-50 border border-gray-100 p-4 rounded-xl focus:ring-2 focus:ring-[#fba931] outline-none">
                </div>

                <div id="field-url" class="md:col-span-2">
                    <label id="label-url" class="text-[11px] font-black uppercase text-gray-600 ml-1">Link (YouTube /
                        Zoom)</label>
                    <input type="text" id="lesson-url" placeholder="https://..."
                        class="w-full bg-gray-50 border border-gray-100 p-4 rounded-xl focus:ring-2 focus:ring-[#fba931] outline-none">
                </div>

                <div id="field-location" class="md:col-span-2 hidden">
                    <label class="text-[11px] font-black uppercase text-gray-600 ml-1">Ubicación / Dirección</label>
                    <input type="text" id="lesson-location" placeholder="Sede PNL Biobío..."
                        class="w-full bg-gray-50 border border-gray-100 p-4 rounded-xl focus:ring-2 focus:ring-[#fba931] outline-none">
                </div>

                <div id="field-date" class="hidden">
                    <label class="text-[11px] font-black uppercase text-gray-600 ml-1">Fecha y Hora</label>
                    <input type="datetime-local" id="lesson-date"
                        class="w-full bg-gray-50 border border-gray-100 p-4 rounded-xl focus:ring-2 focus:ring-[#fba931] outline-none">
                </div>

                <div>
                    <label class="text-[11px] font-black uppercase text-gray-600 ml-1">Duración (Ej: 45 min)</label>
                    <input type="text" id="lesson-duration"
                        class="w-full bg-gray-50 border border-gray-100 p-4 rounded-xl focus:ring-2 focus:ring-[#fba931] outline-none">
                </div>

                <div>
                    <label class="text-[11px] font-black uppercase text-gray-600 ml-1">Capacidad Máxima
                        (0=infinito)</label>
                    <input type="number" id="lesson-capacity" value="0"
                        class="w-full bg-gray-50 border border-gray-100 p-4 rounded-xl focus:ring-2 focus:ring-[#fba931] outline-none">
                </div>

                <div class="md:col-span-2 flex gap-4 pt-4">
                    <button type="button" onclick="closeModal()"
                        class="flex-1 bg-gray-100 text-gray-600 py-4 rounded-xl font-900 uppercase text-xs hover:bg-gray-200">Cancelar</button>
                    <button type="submit"
                        class="flex-1 bg-[#fba931] text-[#0f172a] py-4 rounded-xl font-900 uppercase text-xs hover:brightness-110 shadow-lg">Guardar
                        Lección</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Listado Inscritos -->
    <div id="reg-modal"
        class="fixed inset-0 bg-black/50 z-[60] hidden flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-8 max-w-xl w-full shadow-2xl mx-4">
            <h2 id="reg-modal-title" class="text-2xl font-900 uppercase mb-6 text-[#0f172a]">Inscritos</h2>
            <div id="reg-list" class="space-y-3 max-h-96 overflow-y-auto pr-2">
                <!-- Miembros inscritos -->
            </div>
            <div class="flex gap-3 mt-6">
                <button onclick="exportToExcel()"
                    class="flex-1 bg-green-600 text-white py-4 rounded-xl font-900 uppercase text-xs hover:bg-green-700 shadow-lg flex items-center justify-center gap-2 transition-all">
                    <span class="material-symbols-outlined text-sm">download</span> Exportar a Excel
                </button>
                <button onclick="document.getElementById('reg-modal').classList.add('hidden')"
                    class="flex-1 bg-gray-100 text-gray-600 py-4 rounded-xl font-900 uppercase text-xs hover:bg-gray-200">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- Modal Quiz Builder -->
    <div id="quiz-builder-modal" class="fixed inset-0 bg-black/50 z-[70] hidden flex items-start justify-center backdrop-blur-sm overflow-y-auto py-10">
        <div class="bg-white rounded-3xl p-8 max-w-3xl w-full shadow-2xl mx-4 my-auto">
            <h2 id="quiz-builder-title" class="text-2xl font-900 uppercase mb-6 text-[#0f172a]">Examen — </h2>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6 p-4 bg-gray-50 rounded-2xl border border-gray-100">
                <div>
                    <label class="text-[11px] font-black uppercase text-gray-600 ml-1">Aprobación %</label>
                    <input type="number" id="qb-pass" min="1" max="100" value="70"
                        class="w-full bg-white border border-gray-200 p-3 rounded-xl text-sm font-bold focus:ring-2 focus:ring-[#fba931] outline-none">
                </div>
                <div>
                    <label class="text-[11px] font-black uppercase text-gray-600 ml-1">Cooldown (h)</label>
                    <input type="number" id="qb-cooldown" min="0" value="24"
                        class="w-full bg-white border border-gray-200 p-3 rounded-xl text-sm font-bold focus:ring-2 focus:ring-[#fba931] outline-none">
                </div>
                <div>
                    <label class="text-[11px] font-black uppercase text-gray-600 ml-1">Preguntas/intento</label>
                    <input type="number" id="qb-perattempt" min="1" placeholder="todas"
                        class="w-full bg-white border border-gray-200 p-3 rounded-xl text-sm font-bold focus:ring-2 focus:ring-[#fba931] outline-none">
                </div>
                <div class="flex items-end pb-1">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="qb-shuffle" checked class="w-5 h-5 accent-[#fba931]">
                        <span class="text-[11px] font-black uppercase text-gray-600">Barajar opciones</span>
                    </label>
                </div>
            </div>

            <div id="qb-warning" class="hidden mb-4 p-3 bg-amber-50 border border-amber-200 rounded-xl text-[11px] font-bold text-amber-700"></div>

            <h3 class="text-xs font-black uppercase text-gray-500 tracking-widest mb-3">Banco de preguntas (<span id="qb-count">0</span>)</h3>
            <div id="qb-questions" class="space-y-2 mb-4 max-h-80 overflow-y-auto pr-2">
                <!-- preguntas dinámicas -->
            </div>

            <button onclick="openQuestionEditor(null)" type="button"
                class="w-full mb-6 bg-gray-100 text-[#0f172a] py-3 rounded-xl font-900 uppercase text-xs hover:bg-gray-200 flex items-center justify-center gap-2">
                <span class="material-symbols-outlined">add</span> Nueva pregunta
            </button>

            <div class="flex gap-4">
                <button type="button" onclick="closeQuizBuilder()"
                    class="flex-1 bg-gray-100 text-gray-600 py-4 rounded-xl font-900 uppercase text-xs hover:bg-gray-200">Cancelar</button>
                <button type="button" onclick="saveQuiz()"
                    class="flex-1 bg-[#fba931] text-[#0f172a] py-4 rounded-xl font-900 uppercase text-xs hover:brightness-110 shadow-lg">Guardar Examen</button>
            </div>
        </div>
    </div>

    <!-- Modal Question Editor -->
    <div id="question-editor-modal" class="fixed inset-0 bg-black/60 z-[80] hidden flex items-center justify-center backdrop-blur-sm overflow-y-auto py-10">
        <div class="bg-white rounded-3xl p-8 max-w-xl w-full shadow-2xl mx-4 my-auto">
            <h3 class="text-lg font-900 uppercase mb-4 text-[#0f172a]">Editar Pregunta</h3>
            <input type="hidden" id="qe-index">

            <label class="text-[11px] font-black uppercase text-gray-600 ml-1">Pregunta</label>
            <textarea id="qe-text" rows="3" required
                class="w-full bg-gray-50 border border-gray-100 p-4 rounded-xl focus:ring-2 focus:ring-[#fba931] outline-none mb-4"></textarea>

            <label class="text-[11px] font-black uppercase text-gray-600 ml-1">Opciones (marca la correcta)</label>
            <div id="qe-options" class="space-y-2 mt-2 mb-2"></div>
            <button type="button" onclick="addOption()" class="text-[11px] font-bold uppercase text-[#fba931] hover:underline mb-4">+ Agregar opción</button>

            <label class="text-[11px] font-black uppercase text-gray-600 ml-1">Explicación opcional (post-aprobación)</label>
            <textarea id="qe-explanation" rows="2"
                class="w-full bg-gray-50 border border-gray-100 p-4 rounded-xl focus:ring-2 focus:ring-[#fba931] outline-none mb-4"></textarea>

            <div class="flex gap-4">
                <button type="button" onclick="closeQuestionEditor()"
                    class="flex-1 bg-gray-100 text-gray-600 py-4 rounded-xl font-900 uppercase text-xs hover:bg-gray-200">Cancelar</button>
                <button type="button" onclick="saveQuestion()"
                    class="flex-1 bg-[#0f172a] text-white py-4 rounded-xl font-900 uppercase text-xs hover:bg-slate-800 shadow-lg">Guardar Pregunta</button>
            </div>
        </div>
    </div>

    <script src="/assets/vendor/supabase-js.js"></script>
    <script type="module" src="supabase-config.js"></script>
    <script type="module" src="/shared.js"></script>
    <script>
        // Obtener course_id de la URL
        function getCourseId() {
            const params = new URLSearchParams(window.location.search);
            let cid = params.get('course_id');

            if (!cid && window.location.hash) {
                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                cid = hashParams.get('course_id');
            }
            if (!cid) cid = localStorage.getItem('pnl_current_course_id');
            return cid;
        }

        const courseId = getCourseId();
        let currentModalData = { id: null, title: '', registrations: [] };

        window.addEventListener('DOMContentLoaded', async () => {
            if (!window.isSupabaseInit) {
                showToast("Error crítico: Base de datos no inicializada.", "error");
                return;
            }

            // 🔐 S-01: verificación de rol contra la BASE DE DATOS (no localStorage)
            const { ok } = await window.verifyAdminAccess(['super_admin', 'admin_forja']);
            if (!ok) {
                showToast('Acceso no autorizado', 'error');
                window.location.href = 'forja-login.html';
                return;
            }

            if (!courseId) {
                showToast("Error: No se recibió un identificador de curso válido.", "error");
                window.location.href = 'admin-forja.html';
                return;
            }

            initNavbar();
            loadCourseInfo();
            loadLessons();

            // Suscripción en tiempo real: Escuchar cambios en inscripciones para refrescar los cupos
            if (supabaseClient) {
                supabaseClient
                    .channel('registrations-updates')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'lesson_registrations' }, () => {
                        console.log("🔄 Cambio detectado en inscripciones, actualizando tabla...");
                        loadLessons();
                    })
                    .subscribe();
            }
        });

        async function loadCourseInfo() {
            const { data, error } = await supabaseClient.from('courses').select('title, level').eq('id', courseId).single();
            if (data) {
                document.getElementById('course-name').textContent = data.title;
                document.getElementById('section-subtitle').textContent = 'Gestión de Contenido Académico';
            }
        }


        const tableBody = document.getElementById('lesson-table-body');
        const modal = document.getElementById('lesson-modal');

        function toggleFields() {
            const type = document.getElementById('lesson-type').value;
            const fUrl = document.getElementById('field-url');
            const fLoc = document.getElementById('field-location');
            const fDate = document.getElementById('field-date');
            const lUrl = document.getElementById('label-url');

            fLoc.classList.add('hidden');
            fDate.classList.add('hidden');
            fUrl.classList.add('hidden');

            if (type === 'recorded') {
                fUrl.classList.remove('hidden');
                lUrl.textContent = 'URL del Video (YouTube/Vimeo)';
            } else if (type === 'live') {
                fUrl.classList.remove('hidden');
                fDate.classList.remove('hidden');
                lUrl.textContent = 'Link de Conexión (Zoom/Meet)';
            } else if (type === 'in_person') {
                fLoc.classList.remove('hidden');
                fDate.classList.remove('hidden');
            }
        }

        async function loadLessons() {
            try {
                // Obtener lecciones con el conteo de inscritos
                const { data, error } = await supabaseClient
                    .from('lessons')
                    .select('*, lesson_registrations(count)')
                    .eq('course_id', courseId)
                    .order('order', { ascending: true });

                if (error) throw error;

                // Cargar quizzes asociados (uno por lección + uno final por curso)
                const { data: quizzes } = await supabaseClient
                    .from('quizzes')
                    .select('id, lesson_id')
                    .eq('course_id', courseId);

                const lessonsWithQuiz = new Set((quizzes || []).filter(q => q.lesson_id).map(q => q.lesson_id));
                const finalQuiz = (quizzes || []).find(q => !q.lesson_id);

                // Marcar el botón "Examen Final" con estado visual
                const finalBtn = document.getElementById('btn-final-exam');
                if (finalQuiz) {
                    finalBtn.classList.remove('bg-white', 'text-[#fba931]', 'border-2', 'border-[#fba931]');
                    finalBtn.classList.add('bg-[#fba931]', 'text-[#0f172a]', 'shadow-lg');
                    document.getElementById('btn-final-exam-text').textContent = 'Examen Final ✓';
                }

                // Anotar has_quiz en cada lesson
                data.forEach(l => l.has_quiz = lessonsWithQuiz.has(l.id));

                if (data.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="6" class="p-10 text-center text-gray-600 italic">No hay lecciones creadas para este curso.</td></tr>';
                    return;
                }

                tableBody.innerHTML = data.map(lesson => {
                    const registeredCount = (lesson.lesson_registrations && lesson.lesson_registrations[0]) ? lesson.lesson_registrations[0].count : 0;
                    const available = lesson.max_capacity > 0 ? (lesson.max_capacity - registeredCount) : '∞';

                    let cuposDisplay = "";
                    if (lesson.max_capacity > 0) {
                        cuposDisplay = `
                            <div class="flex flex-col items-center leading-none">
                                <span class="text-[8px] font-black text-gray-500 uppercase tracking-widest mb-1">CUPOS</span>
                                <div class="font-black text-sm flex items-center gap-1">
                                    <span class="text-gray-600" title="Total">${lesson.max_capacity}</span>
                                    <span class="text-gray-200">/</span>
                                    <span class="text-green-600" title="Disponibles">${available > 0 ? available : 0}</span>
                                </div>
                            </div>
                        `;
                    } else {
                        cuposDisplay = '<span class="text-[11px] font-black text-gray-500 italic uppercase tracking-widest">Ilimitado</span>';
                    }

                    return `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="p-6 font-black text-[#fba931] text-center">${lesson.order}</td>
                        <td class="p-6">
                            <div class="font-bold text-sm uppercase">${lesson.title}</div>
                            <div class="text-[11px] text-gray-600 uppercase font-black tracking-tighter">${lesson.duration || 'Sin duración'}</div>
                        </td>
                        <td class="p-6 text-center">
                            <span class="px-2 py-1 rounded-md text-[11px] font-black uppercase bg-gray-100">
                                ${lesson.delivery_type === 'recorded' ? '🎥 Grabado' : lesson.delivery_type === 'live' ? '📡 En Vivo' : '🏛️ Presencial'}
                            </span>
                        </td>
                        <td class="p-6 text-[11px] font-bold text-gray-500 text-center">
                            ${lesson.event_date ? new Date(lesson.event_date).toLocaleString('es-CL', { dateStyle: 'short', timeStyle: 'short' }) : '---'}
                        </td>
                        <td class="p-6 text-center">
                            <button onclick="viewRegistrations('${lesson.id}', '${lesson.title}')" class="hover:opacity-70 transition-opacity">
                                ${cuposDisplay}
                            </button>
                        </td>
                        <td class="p-6 text-right whitespace-nowrap">
                            <button onclick="openQuizBuilder('${lesson.id}')" class="p-2 rounded-lg transition-colors ${lesson.has_quiz ? 'text-[#fba931] hover:bg-amber-50' : 'text-gray-500 hover:bg-gray-100 hover:text-[#fba931]'}" title="${lesson.has_quiz ? 'Editar examen' : 'Crear examen'}"><span class="material-symbols-outlined">quiz</span></button>
                            <button onclick='editLesson(${JSON.stringify(lesson)})' class="p-2 text-[#0f172a] hover:bg-gray-100 rounded-lg"><span class="material-symbols-outlined">edit</span></button>
                            <button onclick="deleteLesson('${lesson.id}')" class="p-2 text-red-500 hover:bg-red-50 rounded-lg"><span class="material-symbols-outlined">delete</span></button>
                        </td>
                    </tr>
                `}).join('');
            } catch (err) {
                console.error(err);
                tableBody.innerHTML = '<tr><td colspan="6" class="p-10 text-center text-red-500 font-bold uppercase text-xs">Error al cargar lecciones.</td></tr>';
            }
        }

        function openModal() {
            document.getElementById('lesson-form').reset();
            document.getElementById('lesson-id').value = '';
            document.getElementById('modal-title').textContent = 'Nueva Lección';
            toggleFields();
            modal.classList.remove('hidden');
        }

        function closeModal() { modal.classList.add('hidden'); }

        async function saveLesson(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            window.setButtonLoading(btn, true);

            const id = document.getElementById('lesson-id').value;
            const lessonData = {
                course_id: courseId,
                title: document.getElementById('lesson-title').value,
                description: document.getElementById('lesson-desc').value,
                delivery_type: document.getElementById('lesson-type').value,
                order: parseInt(document.getElementById('lesson-order').value),
                content_url: document.getElementById('lesson-url').value || null,
                location: document.getElementById('lesson-location').value || null,
                event_date: document.getElementById('lesson-date').value ? new Date(document.getElementById('lesson-date').value).toISOString() : null,
                duration: document.getElementById('lesson-duration').value || null,
                max_capacity: parseInt(document.getElementById('lesson-capacity').value) || 0
            };

            try {
                let error;
                if (id) {
                    ({ error } = await supabaseClient.from('lessons').update(lessonData).eq('id', id));
                } else {
                    ({ error } = await supabaseClient.from('lessons').insert([lessonData]));
                }

                window.setButtonLoading(btn, false);
                if (error) throw error;
                showToast('Lección guardada con éxito.', 'success');
                closeModal();
                loadLessons();
            } catch (err) {
                window.setButtonLoading(btn, false);
                showToast('Error al guardar: ' + err.message, 'error');
            }
        }

        async function deleteLesson(id) {
            if (!confirm('¿Seguro que deseas eliminar esta lección?')) return;
            try {
                const { error } = await supabaseClient.from('lessons').delete().eq('id', id);
                if (error) throw error;
                loadLessons();
            } catch (err) { showToast(err.message, 'error'); }
        }

        function editLesson(lesson) {
            openModal();
            document.getElementById('lesson-id').value = lesson.id;
            document.getElementById('lesson-title').value = lesson.title;
            document.getElementById('lesson-desc').value = lesson.description || '';
            document.getElementById('lesson-type').value = lesson.delivery_type;
            document.getElementById('lesson-order').value = lesson.order;
            document.getElementById('lesson-url').value = lesson.content_url || '';
            document.getElementById('lesson-location').value = lesson.location || '';
            document.getElementById('lesson-duration').value = lesson.duration || '';
            document.getElementById('lesson-capacity').value = lesson.max_capacity || 0;

            if (lesson.event_date) {
                const d = new Date(lesson.event_date);
                const localISOTime = new Date(d.getTime() - (d.getTimezoneOffset() * 60000)).toISOString().slice(0, 16);
                document.getElementById('lesson-date').value = localISOTime;
            }

            document.getElementById('modal-title').textContent = 'Editar Lección';
            toggleFields();
        }

        async function viewRegistrations(lessonId, lessonTitle) {
            document.getElementById('reg-modal-title').textContent = `Inscritos: ${lessonTitle}`;
            const list = document.getElementById('reg-list');
            list.innerHTML = '<p class="text-center text-gray-600 py-10 italic">Buscando inscritos...</p>';
            document.getElementById('reg-modal').classList.remove('hidden');

            try {
                // S-02: inscritos + datos de contacto vía RPC gated a admin Forja
                const { data, error } = await supabaseClient
                    .rpc('admin_lesson_registrations', { p_lesson_id: lessonId });

                if (error) throw error;

                currentModalData = { id: lessonId, title: lessonTitle, registrations: data || [] };

                if (data.length === 0) {
                    list.innerHTML = '<p class="text-center text-gray-600 py-10">No hay inscritos todavía.</p>';
                    return;
                }

                list.innerHTML = data.map(reg => `
                    <div class="flex justify-between items-center p-4 bg-gray-50 rounded-2xl border border-gray-100">
                        <div>
                            <p class="font-black uppercase text-xs">${reg.profiles.full_name}</p>
                            <p class="text-[11px] text-gray-600 font-bold tracking-widest uppercase">${reg.profiles.rut || 'SIN RUT'} • ${reg.profiles.email || 'SIN EMAIL'}</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="toggleAttendance('${reg.id}', ${!reg.attended}, '${lessonId}', '${lessonTitle}')" 
                                    class="px-4 py-2 rounded-xl text-[11px] font-black uppercase transition-all
                                    ${reg.attended ? 'bg-green-100 text-green-700 hover:bg-green-200' : 'bg-gray-200 text-gray-600 hover:bg-gray-300'}">
                                ${reg.attended ? 'Asistió' : 'Marcar Asistencia'}
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                list.innerHTML = '<p class="text-red-500 text-center font-bold">Error al cargar la lista.</p>';
            }
        }

        async function toggleAttendance(regId, newState, lessonId, lessonTitle) {
            try {
                const { error } = await supabaseClient
                    .from('lesson_registrations')
                    .update({ attended: newState })
                    .eq('id', regId);

                if (error) throw error;
                viewRegistrations(lessonId, lessonTitle);
            } catch (err) {
                showToast('Error al actualizarasistencia: ' + err.message, 'error');
            }
        }

        function exportToExcel() {
            const { title, registrations } = currentModalData;
            if (!registrations || registrations.length === 0) {
                showToast("No hay datos para exportar.", "info");
                return;
            }

            // Crear contenido CSV con BOM para visualización correcta en Excel (UTF-8)
            let csvContent = "\uFEFF"; 
            csvContent += "Nombre Completo;RUT;Email;Asistencia\n";

            registrations.forEach(reg => {
                const name = reg.profiles?.full_name || 'N/A';
                const rut = reg.profiles?.rut || 'N/A';
                const email = reg.profiles?.email || 'N/A';
                const attendance = reg.attended ? 'SÍ' : 'NO';
                csvContent += `"${name}";"${rut}";"${email}";"${attendance}"\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `Inscritos_${title.replace(/[^a-z0-9]/gi, '_')}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // ===========================================
        //  QUIZ BUILDER
        // ===========================================
        let qbState = {
            quiz: null,        // {id, lesson_id, ...} o null si es examen final nuevo
            lessonId: null,    // null = examen final del curso
            questions: []      // array de {id?, question_text, options:[], explanation, order_index}
        };

        async function openQuizBuilder(lessonId) {
            qbState = { quiz: null, lessonId, questions: [] };

            // Cargar quiz existente si hay
            let query = supabaseClient.from('quizzes').select('*').eq('course_id', courseId);
            query = lessonId ? query.eq('lesson_id', lessonId) : query.is('lesson_id', null);
            const { data: quiz } = await query.maybeSingle();

            if (quiz) {
                qbState.quiz = quiz;
                document.getElementById('qb-pass').value = quiz.pass_threshold;
                document.getElementById('qb-cooldown').value = quiz.cooldown_hours;
                document.getElementById('qb-perattempt').value = quiz.questions_per_attempt || '';
                document.getElementById('qb-shuffle').checked = quiz.shuffle_options;

                const { data: questions } = await supabaseClient
                    .from('quiz_questions')
                    .select('*')
                    .eq('quiz_id', quiz.id)
                    .order('order_index', { ascending: true });
                qbState.questions = (questions || []).map(q => ({ ...q }));
            } else {
                document.getElementById('qb-pass').value = 70;
                document.getElementById('qb-cooldown').value = 24;
                document.getElementById('qb-perattempt').value = '';
                document.getElementById('qb-shuffle').checked = true;
            }

            // Título contextual
            if (lessonId) {
                const lessonTitle = document.querySelector(`button[onclick*="${lessonId}"]`)
                    ?.closest('tr')?.querySelector('.font-bold')?.textContent || '...';
                document.getElementById('quiz-builder-title').textContent = `Examen — ${lessonTitle}`;
            } else {
                document.getElementById('quiz-builder-title').textContent = 'Examen Final del Curso';
            }

            renderQbQuestions();
            document.getElementById('quiz-builder-modal').classList.remove('hidden');
        }

        function closeQuizBuilder() {
            document.getElementById('quiz-builder-modal').classList.add('hidden');
        }

        function renderQbQuestions() {
            const container = document.getElementById('qb-questions');
            document.getElementById('qb-count').textContent = qbState.questions.length;

            // Warning de banco ajustado
            const N = parseInt(document.getElementById('qb-perattempt').value) || qbState.questions.length;
            const warningEl = document.getElementById('qb-warning');
            if (N > 0 && N > qbState.questions.length - 3 && qbState.questions.length > 0) {
                warningEl.textContent = '⚠ Banco muy ajustado: el alumno verá casi las mismas preguntas en cada intento. Recomendado al menos 3 preguntas extra.';
                warningEl.classList.remove('hidden');
            } else {
                warningEl.classList.add('hidden');
            }

            if (qbState.questions.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-600 italic py-8 text-xs">Sin preguntas. Agrega la primera abajo.</p>';
                return;
            }

            container.innerHTML = qbState.questions.map((q, i) => `
                <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl border border-gray-100">
                    <span class="text-[11px] font-black text-gray-600 w-6 text-center">${i + 1}</span>
                    <p class="flex-1 text-xs font-bold text-[#0f172a] truncate">${escapeHtml(q.question_text)}</p>
                    <button type="button" onclick="openQuestionEditor(${i})" class="p-1 text-[#0f172a] hover:bg-white rounded"><span class="material-symbols-outlined text-base">edit</span></button>
                    <button type="button" onclick="deleteQuestion(${i})" class="p-1 text-red-500 hover:bg-red-50 rounded"><span class="material-symbols-outlined text-base">delete</span></button>
                </div>
            `).join('');
        }

        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }

        function deleteQuestion(idx) {
            if (!confirm('¿Eliminar esta pregunta del banco?')) return;
            qbState.questions.splice(idx, 1);
            renderQbQuestions();
        }

        // ===========================================
        //  QUESTION EDITOR
        // ===========================================
        let qeIndex = null; // null = nueva
        let qeOptions = []; // {id:'a', text:'...', is_correct:bool}

        function openQuestionEditor(idx) {
            qeIndex = idx;
            if (idx === null) {
                document.getElementById('qe-text').value = '';
                document.getElementById('qe-explanation').value = '';
                qeOptions = [
                    { id: 'a', text: '', is_correct: true },
                    { id: 'b', text: '', is_correct: false }
                ];
            } else {
                const q = qbState.questions[idx];
                document.getElementById('qe-text').value = q.question_text;
                document.getElementById('qe-explanation').value = q.explanation || '';
                qeOptions = JSON.parse(JSON.stringify(q.options));
            }
            renderOptions();
            document.getElementById('question-editor-modal').classList.remove('hidden');
        }

        function closeQuestionEditor() {
            document.getElementById('question-editor-modal').classList.add('hidden');
        }

        function renderOptions() {
            const container = document.getElementById('qe-options');
            container.innerHTML = qeOptions.map((opt, i) => `
                <div class="flex items-center gap-2">
                    <input type="radio" name="qe-correct" ${opt.is_correct ? 'checked' : ''}
                        onchange="markCorrect(${i})"
                        class="w-5 h-5 accent-[#fba931] cursor-pointer">
                    <span class="text-[11px] font-black text-gray-600 w-4">${opt.id.toUpperCase()}</span>
                    <input type="text" value="${escapeHtml(opt.text)}"
                        oninput="qeOptions[${i}].text = this.value"
                        placeholder="Texto de la opción"
                        class="flex-1 bg-gray-50 border border-gray-100 p-2 rounded-lg text-sm focus:ring-2 focus:ring-[#fba931] outline-none">
                    <button type="button" onclick="removeOption(${i})"
                        ${qeOptions.length <= 2 ? 'disabled class="opacity-30 cursor-not-allowed p-1"' : 'class="text-red-500 hover:bg-red-50 p-1 rounded"'}>
                        <span class="material-symbols-outlined text-base">close</span>
                    </button>
                </div>
            `).join('');
        }

        function markCorrect(i) {
            qeOptions = qeOptions.map((o, j) => ({ ...o, is_correct: i === j }));
        }

        function addOption() {
            if (qeOptions.length >= 6) {
                showToast('Máximo 6 opciones por pregunta.', 'warning');
                return;
            }
            const nextId = String.fromCharCode('a'.charCodeAt(0) + qeOptions.length);
            qeOptions.push({ id: nextId, text: '', is_correct: false });
            renderOptions();
        }

        function removeOption(i) {
            if (qeOptions.length <= 2) return;
            qeOptions.splice(i, 1);
            // Re-asignar ids a, b, c... para mantener contigüidad
            qeOptions = qeOptions.map((o, idx) => ({
                ...o,
                id: String.fromCharCode('a'.charCodeAt(0) + idx)
            }));
            // Si la eliminada era la correcta, marcar la primera
            if (!qeOptions.some(o => o.is_correct)) qeOptions[0].is_correct = true;
            renderOptions();
        }

        function saveQuestion() {
            const text = document.getElementById('qe-text').value.trim();
            const explanation = document.getElementById('qe-explanation').value.trim();

            if (!text) { showToast('La pregunta no puede estar vacía.', 'warning'); return; }
            if (qeOptions.length < 2) { showToast('Mínimo 2 opciones.', 'warning'); return; }
            if (qeOptions.some(o => !o.text.trim())) { showToast('Todas las opciones deben tener texto.', 'warning'); return; }
            if (!qeOptions.some(o => o.is_correct)) { showToast('Marca una opción como correcta.', 'warning'); return; }

            const newQ = {
                question_text: text,
                options: qeOptions,
                explanation: explanation || null,
                order_index: qeIndex === null ? qbState.questions.length + 1 : qbState.questions[qeIndex].order_index
            };
            if (qeIndex !== null && qbState.questions[qeIndex].id) {
                newQ.id = qbState.questions[qeIndex].id;
            }

            if (qeIndex === null) qbState.questions.push(newQ);
            else qbState.questions[qeIndex] = newQ;

            closeQuestionEditor();
            renderQbQuestions();
        }

        // ===========================================
        //  GUARDAR QUIZ COMPLETO
        // ===========================================
        async function saveQuiz() {
            if (qbState.questions.length === 0) {
                if (!confirm('No has agregado preguntas. ¿Guardar el quiz vacío?')) return;
            }

            const payload = {
                course_id: courseId,
                lesson_id: qbState.lessonId,
                title: qbState.lessonId ? 'Quiz de lección' : 'Examen Final del Curso',
                pass_threshold: parseInt(document.getElementById('qb-pass').value),
                cooldown_hours: parseInt(document.getElementById('qb-cooldown').value),
                questions_per_attempt: parseInt(document.getElementById('qb-perattempt').value) || null,
                shuffle_options: document.getElementById('qb-shuffle').checked,
                is_active: true
            };

            try {
                let quizId = qbState.quiz?.id;
                if (quizId) {
                    payload.updated_at = new Date().toISOString();
                    const { error } = await supabaseClient.from('quizzes').update(payload).eq('id', quizId);
                    if (error) throw error;
                } else {
                    const { data: created, error } = await supabaseClient
                        .from('quizzes').insert(payload).select('id').single();
                    if (error) throw error;
                    quizId = created.id;
                }

                // Diff de preguntas: borrar las que ya no están
                const { data: existing } = await supabaseClient
                    .from('quiz_questions').select('id').eq('quiz_id', quizId);
                const currentIds = new Set(qbState.questions.filter(q => q.id).map(q => q.id));
                const toDelete = (existing || []).filter(e => !currentIds.has(e.id)).map(e => e.id);

                if (toDelete.length > 0) {
                    await supabaseClient.from('quiz_questions').delete().in('id', toDelete);
                }

                // Upsert preguntas
                for (const q of qbState.questions) {
                    const row = {
                        quiz_id: quizId,
                        question_text: q.question_text,
                        options: q.options,
                        explanation: q.explanation,
                        order_index: q.order_index
                    };
                    if (q.id) {
                        await supabaseClient.from('quiz_questions').update(row).eq('id', q.id);
                    } else {
                        await supabaseClient.from('quiz_questions').insert(row);
                    }
                }

                showToast('Examen guardado correctamente.', 'success');
                closeQuizBuilder();
                loadLessons();
            } catch (err) {
                console.error(err);
                showToast('Error al guardar: ' + err.message, 'error');
            }
        }

        // Re-render warning al cambiar el input de preguntas/intento
        document.addEventListener('DOMContentLoaded', () => {
            const inp = document.getElementById('qb-perattempt');
            if (inp) inp.addEventListener('input', renderQbQuestions);
        });
    </script>
</body>

</html>
