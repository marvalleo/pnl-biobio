<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activar Cuenta - Forja Libertaria</title>
    <link rel="stylesheet" href="/out.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        :root {
            --pnl-blue: #0f172a;
            --pnl-gold: #fba931;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--pnl-blue);
            color: var(--pnl-blue);
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }
        }

        .error-shake {
            animation: shake 0.3s ease-in-out;
            border-color: #ef4444 !important;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-3xl p-8 shadow-2xl text-center border-t-8 border-[#fba931] mx-auto">
        <a href="forja-login.html"
            class="absolute top-4 left-4 text-white opacity-50 hover:opacity-100 flex items-center gap-1 transition-opacity">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg> Volver
        </a>

        <img src="/assets/images/logos/pnl-del-biobio01.png" alt="Logo PNL" class="h-20 mx-auto mb-6">
        <h1 id="main-title" class="text-2xl font-900 uppercase mb-2 tracking-tighter">Activar Cuenta</h1>
        <p id="sub-title" class="text-gray-400 text-[10px] font-bold uppercase tracking-widest mb-8">Validación de Padrón Biobío</p>

        <div id="activation-container" class="space-y-4 text-left">
            <!-- Mensajes de Feedback -->
            <div id="feedback-message" class="hidden p-4 mb-4 rounded-lg bg-blue-50 border-l-4 border-blue-500">
                <p class="text-blue-800 text-xs font-bold uppercase tracking-wider feedback-text"></p>
            </div>

            <div>
                <label class="text-[10px] font-black uppercase text-gray-400 ml-1">Tu Correo Electrónico</label>
                <input type="email" id="email-input" placeholder="nombre@ejemplo.cl"
                    class="w-full bg-gray-50 border border-gray-100 p-4 rounded-xl focus:ring-2 focus:ring-[#fba931] outline-none transition-all font-bold text-lg">
                <p class="text-[9px] text-gray-400 mt-2 font-bold ml-1">
                    * Debe ser el correo con el que te inscribiste en el partido.
                </p>
            </div>

            <div class="flex items-start gap-3 p-4 bg-gray-50 rounded-2xl border border-gray-100">
                <input type="checkbox" id="consent-check"
                    class="mt-1 w-4 h-4 rounded border-gray-300 text-[#fba931] focus:ring-[#fba931] cursor-pointer">
                <label for="consent-check"
                    class="text-[9px] font-bold text-gray-500 uppercase leading-relaxed cursor-pointer select-none">
                    Doy mi consentimiento explícito para el tratamiento de mis <span class="text-[#fba931]">datos
                        sensibles (opiniones políticas)</span> de acuerdo a la <a href="privacidad.html" target="_blank"
                        class="underline hover:text-[#0f172a]">Política de Privacidad (Ley 21.719)</a>.
                </label>
            </div>

            <button onclick="handleActivation()"
                class="w-full bg-[#fba931] text-[#0f172a] py-4 rounded-xl font-900 uppercase tracking-widest hover:brightness-110 active:scale-[0.98] transition-all shadow-lg flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                </svg> <span id="btn-text">Solicitar Link de Acceso</span>
            </button>
        </div>

        <p class="mt-8 text-[10px] font-bold text-gray-400 uppercase leading-relaxed">
            Te enviaremos un <strong class="text-[#fba931]">Enlace Mágico</strong> a tu correo.<br> Úsalo para definir
            tu contraseña personal.
        </p>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="supabase-config.js"></script>

    <script>
        // Configuración de MODO (Activar vs Recuperar)
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const mode = params.get('mode');
            if (mode === 'recover') {
                document.getElementById('main-title').textContent = 'Recuperar Clave';
                document.getElementById('sub-title').textContent = 'Seguridad de tu Cuenta';
                document.getElementById('btn-text').textContent = 'Enviar Enlace de Recuperación';
            }
        });

        async function handleActivation() {
            if (!window.isSupabaseInit) {
                showFeedback('Conectando con la base de datos... Por favor, intenta de nuevo en un momento.', 'info');
                return;
            }
            const email = document.getElementById('email-input').value.trim();
            const consent = document.getElementById('consent-check').checked;
            const btn = document.querySelector('button');
            const feedbackBox = document.getElementById('feedback-message');

            if (!email || !email.includes('@')) {
                showFeedback('Por favor, ingresa un correo válido.', 'error');
                return;
            }

            if (!consent) {
                showFeedback('Debes aceptar la política de privacidad para continuar.', 'error');
                return;
            }

            // UI Loading
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="animate-spin h-5 w-5 border-2 border-[#0f172a] border-t-transparent rounded-full mr-2"></span> Procesando...';
            feedbackBox.classList.add('hidden');

            try {
                // 1. VALIDACIÓN SEGURA MEDITE RPC: El portero inteligente
                const { data: emailExists, error: rpcError } = await supabaseClient
                    .rpc('check_email_exists', { email_in: email });

                if (rpcError || !emailExists) {
                    showFeedback('❌ Este correo no se encuentra en el Padrón oficial. Por favor, verifica que sea el mismo con el que te inscribiste.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                    document.getElementById('activation-container').classList.add('error-shake');
                    setTimeout(() => document.getElementById('activation-container').classList.remove('error-shake'), 500);
                    return;
                }

                // 2. Generar URL de redirección Inteligente: Local vs Producción
                const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
                const baseUrl = isLocal ? window.location.origin : 'https://nacionallibertariobiobio.cl';
                const redirectUrl = baseUrl + '/forja-reset-password.html';

                const { data, error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                    redirectTo: redirectUrl
                });

                if (error) {
                    // Detectar Rate Limit de forma más robusta
                    const isRateLimit = error.message.toLowerCase().includes("rate limit") || error.status === 429;
                    
                    if (isRateLimit) {
                        const rateLimitMsg = "Límite de seguridad alcanzado. Supabase bloquea el envío excesivo de correos para evitar Spam. Por favor, <strong>espera 15 minutos</strong> antes de intentar nuevamente.";
                        showFeedback(`⚠️ ${rateLimitMsg}`, 'error');
                        
                        // Registrar en logs para el administrador
                        if (window.logError) {
                            window.logError(`Rate Limit alcanzado en Activación: ${email}`, { status: error.status, original_error: error.message });
                        }
                        return;
                    }
                    throw error;
                }

                // 3. ÉXITO: Cambiar de vista completa para el usuario
                if (window.logSystemEvent) {
                    window.logSystemEvent('registration', 'info', `Solicitud de enlace de activación para: ${email}`);
                }

                const container = document.getElementById('activation-container');
                container.innerHTML = `
                    <div class="text-center p-8 animate-fade-in">
                        <div class="w-24 h-24 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg border-4 border-white">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                            </svg>
                        </div>
                        <h2 class="text-2xl font-black text-[#0f172a] mb-2 uppercase tracking-tight">¡Correo Enviado!</h2>
                        <p class="text-slate-600 mb-6 text-sm">Se ha enviado un correo electrónico a <b>${email}</b>.</p>
                        
                        <div class="bg-slate-50 border border-slate-200 rounded-2xl p-6 mb-8 text-left shadow-inner">
                            <h3 class="font-black text-[10px] uppercase text-slate-400 tracking-widest mb-4 flex items-center gap-2">
                                Qué hacer ahora:
                            </h3>
                            <ul class="text-slate-700 space-y-4">
                                <li class="flex gap-4">
                                    <span class="bg-[#0f172a] text-white rounded-full w-7 h-7 flex items-center justify-center shrink-0 font-bold text-sm shadow-sm">1</span>
                                    <span class="text-sm">Revisa tu bandeja de entrada en los próximos minutos.</span>
                                </li>
                                <li class="flex gap-4">
                                    <span class="bg-amber-500 text-[#0f172a] rounded-full w-7 h-7 flex items-center justify-center shrink-0 font-bold text-sm shadow-sm">2</span>
                                    <span class="text-sm">Busca el mensaje del <b>"Partido Nacional Libertario"</b>. Por seguridad, el asunto puede decir <b>"Reset Password"</b>.</span>
                                </li>
                                <li class="flex gap-4">
                                    <span class="bg-[#0f172a] text-white rounded-full w-7 h-7 flex items-center justify-center shrink-0 font-bold text-sm shadow-sm">3</span>
                                    <span class="text-sm">Haz clic en el enlace para definir tu contraseña y activar tu cuenta.</span>
                                </li>
                            </ul>
                        </div>

                        <div class="p-4 bg-amber-50 rounded-xl border border-amber-100 mb-8">
                            <p class="text-amber-800 text-[11px] font-medium flex items-center justify-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                                </svg>
                                IMPORTANTE: Si no ves el mensaje, revisa en la carpeta de SPAM.
                            </p>
                        </div>

                        <button onclick="location.reload()" 
                                class="text-slate-400 hover:text-amber-500 font-black text-[10px] uppercase tracking-widest transition-colors flex items-center justify-center gap-2 mx-auto">
                            Volver a intentar
                        </button>
                    </div>
                `;

            } catch (err) {
                console.error("Activation Error:", err);
                const readableError = err.message.includes("Email not found") 
                    ? "Este correo no se encuentra en el Padrón oficial. Por favor, verifica que sea el mismo con el que te inscribiste."
                    : err.message;
                
                showFeedback(`❌ Error: ${readableError}`, 'error');
                document.getElementById('activation-container').classList.add('error-shake');
                setTimeout(() => document.getElementById('activation-container').classList.remove('error-shake'), 500);

                if (window.logError) {
                    window.logError(`Fallo en Activación de cuenta: ${email}`, { error: err.message });
                }
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }

        function showFeedback(msg, type) {
            const box = document.getElementById('feedback-message');
            const text = box.querySelector('.feedback-text');

            box.classList.remove('hidden', 'bg-red-50', 'border-red-500', 'bg-blue-50', 'border-blue-500', 'bg-green-50', 'border-green-500');
            text.classList.remove('text-red-800', 'text-blue-800', 'text-green-800');

            if (type === 'error') {
                box.classList.add('bg-red-50', 'border-red-500');
                text.classList.add('text-red-800');
            } else if (type === 'success') {
                box.classList.add('bg-green-50', 'border-green-500');
                text.classList.add('text-green-800');
            } else {
                box.classList.add('bg-blue-50', 'border-blue-500');
                text.classList.add('text-blue-800');
            }

            text.innerHTML = msg;
            box.classList.remove('hidden');
        }

        // Enter key support
        document.getElementById('email-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleActivation();
        });
    </script>
</body>

</html>
