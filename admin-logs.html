<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoría de Sistema - PNL Biobío</title>
    <link rel="stylesheet" href="/input.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root {
            --pnl-blue: #0f172a;
            --pnl-gold: #fba931;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f3f4f6;
            color: var(--pnl-blue);
        }

        .log-row:hover { background-color: #f9fafb; cursor: pointer; }
        
        .badge {
            font-size: 8px;
            font-weight: 900;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: 9999px;
            letter-spacing: 0.1em;
        }

        .level-info { background-color: #dbeafe; color: #1d4ed8; }
        .level-warning { background-color: #fef3c7; color: #b45309; }
        .level-error { background-color: #fee2e2; color: #b91c1c; }
        .level-critical { background-color: #dc2626; color: #ffffff; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }

        .type-login { background-color: #f1f5f9; color: #475569; }
        .type-error { background-color: #fef2f2; color: #dc2626; border: 1px solid #fee2e2; }
        .type-registration { background-color: #dcfce7; color: #15803d; }
        .type-security { background-color: #f3e8ff; color: #7e22ce; }
    </style>
</head>

<body class="min-h-screen pb-20">
    <!-- NAVEGACIÓN -->
    <nav class="bg-white shadow-md border-b-4 border-[#fba931] px-6 py-1 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-6">
            <a href="admin-dashboard.html" class="flex items-center gap-3 hover:opacity-80 transition-all group">
                <img src="/assets/images/logos/pnl-del-biobio01.png" alt="Logo PNL" style="max-height: 70px;">
                <div class="flex flex-col">
                    <span class="text-[9px] font-black uppercase text-[#fba931] leading-none mb-1">PNL Biobío</span>
                    <span class="font-black text-lg uppercase leading-none">Auditoría / Logs</span>
                </div>
            </a>
            <div class="h-8 w-[1px] bg-gray-200 hidden md:block"></div>
            <a href="admin-dashboard.html" class="text-[10px] font-black uppercase text-gray-400 hover:text-[#0f172a] transition-all flex items-center gap-1">
                <span class="material-symbols-outlined text-lg">arrow_back</span> Panel Central
            </a>
        </div>
        <div id="user-menu-container" class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-full bg-gray-100 animate-pulse"></div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <!-- Encabezado con Filtros -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-10">
            <div>
                <h1 class="text-3xl font-900 uppercase">Registro de Eventos</h1>
                <p class="text-[10px] font-black uppercase text-gray-400 tracking-[0.3em]">Hitorial de Actividad y Errores Críticos</p>
            </div>

            <div class="flex flex-wrap gap-3">
                <select id="filter-type" onchange="loadLogs()" class="bg-white border-0 rounded-xl px-4 py-3 text-[10px] font-black uppercase tracking-widest shadow-sm outline-none focus:ring-2 focus:ring-[#fba931]">
                    <option value="">Todos los tipos</option>
                    <option value="login">Inicios de Sesión</option>
                    <option value="error">errores</option>
                    <option value="registration">Inscripciones</option>
                    <option value="security">Seguridad</option>
                </select>

                <select id="filter-level" onchange="loadLogs()" class="bg-white border-0 rounded-xl px-4 py-3 text-[10px] font-black uppercase tracking-widest shadow-sm outline-none focus:ring-2 focus:ring-[#fba931]">
                    <option value="">Todos los niveles</option>
                    <option value="info">Información</option>
                    <option value="warning">Advertencia</option>
                    <option value="error">Error</option>
                    <option value="critical">Crítico</option>
                </select>

                <button onclick="loadLogs()" class="bg-[#0f172a] text-white p-3 rounded-xl hover:brightness-110 transition-all flex items-center justify-center">
                    <span class="material-symbols-outlined">refresh</span>
                </button>
            </div>
        </div>

        <!-- Tabla de Logs -->
        <div class="bg-white rounded-[2.5rem] shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-100">
                            <th class="px-8 py-4 text-[10px] font-black uppercase text-gray-400 tracking-widest">Fecha / Hora</th>
                            <th class="px-6 py-4 text-[10px] font-black uppercase text-gray-400 tracking-widest text-center">Nivel</th>
                            <th class="px-6 py-4 text-[10px] font-black uppercase text-gray-400 tracking-widest text-center">Tipo</th>
                            <th class="px-6 py-4 text-[10px] font-black uppercase text-gray-400 tracking-widest">Usuario / Actor</th>
                            <th class="px-8 py-4 text-[10px] font-black uppercase text-gray-400 tracking-widest">Mensaje del Evento</th>
                            <th class="px-8 py-4 text-[10px] font-black uppercase text-gray-400 tracking-widest text-right">Detalle</th>
                        </tr>
                    </thead>
                    <tbody id="logs-tbody">
                        <!-- Cargando... -->
                        <tr>
                            <td colspan="6" class="px-8 py-20 text-center">
                                <span class="material-symbols-outlined text-4xl animate-spin text-gray-200">progress_activity</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal de Detalle de Log -->
    <div id="log-modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 z-[10000] backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl rounded-[2.5rem] overflow-hidden shadow-2xl animate-scale-up">
            <div class="p-8 border-b border-gray-100 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div id="modal-type-icon" class="w-12 h-12 rounded-2xl flex items-center justify-center">
                        <span class="material-symbols-outlined text-2xl">history</span>
                    </div>
                    <div>
                        <h3 class="text-xl font-900 uppercase" id="modal-title">Detalle del Log</h3>
                        <p id="modal-timestamp" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest"></p>
                    </div>
                </div>
                <button onclick="closeModal()" class="w-10 h-10 rounded-full bg-gray-100 text-gray-400 hover:bg-gray-200 transition-all flex items-center justify-center">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            
            <div class="p-8 space-y-6 max-h-[60vh] overflow-y-auto">
                <div>
                    <label class="text-[10px] font-black uppercase text-[#fba931] mb-1 block">Mensaje Completo</label>
                    <p id="modal-message" class="text-sm font-bold text-slate-800 leading-relaxed"></p>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="text-[10px] font-black uppercase text-[#fba931] mb-1 block">Usuario / Perfil</label>
                        <p id="modal-user" class="text-xs font-medium text-slate-500"></p>
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase text-[#fba931] mb-1 block">Página / URL</label>
                        <p id="modal-url" class="text-xs font-medium text-slate-500 truncate"></p>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-black uppercase text-[#fba931] mb-1 block">Navegador / System Info</label>
                    <p id="modal-agent" class="text-[9px] font-mono text-gray-400 bg-gray-50 p-3 rounded-lg"></p>
                </div>

                <div id="modal-metadata-container">
                    <label class="text-[10px] font-black uppercase text-[#fba931] mb-2 block">Metadatos / Error Stack</label>
                    <pre id="modal-metadata" class="text-[9px] font-mono whitespace-pre-wrap bg-slate-900 text-emerald-400 p-5 rounded-2xl max-h-60 overflow-y-auto"></pre>
                </div>
            </div>
            
            <div class="p-8 bg-gray-50 flex justify-end">
                <button onclick="closeModal()" class="px-8 py-3 bg-[#0f172a] text-white rounded-xl font-900 text-[10px] uppercase tracking-widest hover:brightness-110 transition-all shadow-lg active:scale-95">
                    Cerrar Detalle
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="supabase-config.js"></script>
    <script type="module" src="/shared.js"></script>
    <script>
        let currentLogs = [];

        window.addEventListener('DOMContentLoaded', async () => {
            // Protección de ruta (Solo súper admin puede ver auditoría)
            let attempts = 0;
            while (!window.isSupabaseInit && attempts < 20) {
                await new Promise(r => setTimeout(r, 100));
                attempts++;
            }

            const { data: { session } } = await supabaseClient.auth.getSession();
            const role = localStorage.getItem('pnl_user_role');

            if (!session || role !== 'super_admin') {
                window.location.href = 'forja-login.html';
                return;
            }

            initNavbar();
            loadLogs();
        });

        async function loadLogs() {
            const typeFilter = document.getElementById('filter-type').value;
            const levelFilter = document.getElementById('filter-level').value;
            const tbody = document.getElementById('logs-tbody');

            tbody.innerHTML = `<tr><td colspan="6" class="px-8 py-20 text-center"><span class="material-symbols-outlined text-4xl animate-spin text-gray-200">progress_activity</span></td></tr>`;

            let query = supabaseClient
                .from('system_logs')
                .select('*, profiles(full_name, email)')
                .order('created_at', { ascending: false })
                .limit(100);

            if (typeFilter) query = query.eq('event_type', typeFilter);
            if (levelFilter) query = query.eq('level', levelFilter);

            const { data, error } = await query;

            if (error) {
                tbody.innerHTML = `<tr><td colspan="6" class="px-8 py-20 text-center text-red-500 font-bold uppercase text-[10px]">Error cargando logs: ${error.message}</td></tr>`;
                return;
            }

            currentLogs = data;

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="px-8 py-20 text-center text-gray-300 font-bold uppercase text-[10px]">No se encontraron registros activos</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map(log => {
                const date = new Date(log.created_at);
                const userLabel = log.profiles ? `${log.profiles.full_name}<br><span class="text-[9px] text-gray-400 font-medium">${log.profiles.email}</span>` : '<span class="text-gray-400 text-[10px]">Anónimo / Sistema</span>';
                
                const levelClasses = {
                    info: 'bg-blue-100 text-blue-700',
                    warning: 'bg-amber-100 text-amber-700',
                    error: 'bg-red-100 text-red-700 font-black',
                    critical: 'bg-red-600 text-white'
                };

                const typeClasses = {
                    login: 'bg-slate-100 text-slate-600',
                    error: 'bg-red-50 text-red-600 border border-red-100',
                    registration: 'bg-emerald-100 text-emerald-700',
                    security: 'bg-purple-100 text-purple-700'
                };

                return `
                    <tr class="log-row border-b border-gray-50 transition-colors" onclick="openLogDetail('${log.id}')">
                        <td class="px-8 py-5 text-[10px] font-bold text-gray-500 uppercase tracking-widest">
                            ${date.toLocaleDateString('es-ES', { day: '2-digit', month: 'short' })} — ${date.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' })}
                        </td>
                        <td class="px-6 py-5 text-center">
                            <span class="badge ${levelClasses[log.level] || 'bg-gray-100'}">${log.level}</span>
                        </td>
                        <td class="px-6 py-5 text-center">
                            <span class="badge ${typeClasses[log.event_type] || 'bg-gray-100'}">${log.event_type}</span>
                        </td>
                        <td class="px-6 py-5">
                            <div class="text-[10px] font-black uppercase text-[#0f172a]">${userLabel}</div>
                        </td>
                        <td class="px-8 py-5">
                            <p class="text-xs font-medium text-gray-600 line-clamp-1">${log.message}</p>
                        </td>
                        <td class="px-8 py-5 text-right">
                            <span class="material-symbols-outlined text-gray-300 hover:text-[#fba931] transition-colors">visibility</span>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function openLogDetail(id) {
            const log = currentLogs.find(l => l.id === id);
            if (!log) return;

            const date = new Date(log.created_at);
            document.getElementById('modal-title').innerText = `Log: ${log.event_type.toUpperCase()}`;
            document.getElementById('modal-timestamp').innerText = `${date.toLocaleDateString('es-ES', { day: '2-digit', month: 'long', year: 'numeric' })} @ ${date.toLocaleTimeString('es-ES')}`;
            document.getElementById('modal-message').innerText = log.message;
            document.getElementById('modal-user').innerText = log.profiles ? `${log.profiles.full_name} (${log.profiles.email})` : 'Anónimo / Sistema';
            document.getElementById('modal-url').innerText = log.page_url || 'N/A';
            document.getElementById('modal-agent').innerText = log.user_agent || 'User Agent desconocido';
            
            const metaEl = document.getElementById('modal-metadata');
            if (log.metadata && Object.keys(log.metadata).length > 0) {
                metaEl.innerText = JSON.stringify(log.metadata, null, 4);
                document.getElementById('modal-metadata-container').style.display = 'block';
            } else {
                metaEl.innerText = '{}';
                document.getElementById('modal-metadata-container').style.display = 'none';
            }

            const iconContainer = document.getElementById('modal-type-icon');
            const icons = { login: 'person', error: 'error', registration: 'app_registration', security: 'verified_user' };
            const colors = { login: 'bg-slate-100 text-slate-600', error: 'bg-red-600 text-white', registration: 'bg-emerald-500 text-white', security: 'bg-purple-600 text-white' };
            
            iconContainer.className = `w-12 h-12 rounded-2xl flex items-center justify-center ${colors[log.event_type] || 'bg-gray-100 text-gray-400'}`;
            iconContainer.innerHTML = `<span class="material-symbols-outlined text-2xl">${icons[log.event_type] || 'history'}</span>`;

            document.getElementById('log-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('log-modal').classList.add('hidden');
        }

        // Cerrar modal al hacer click fuera
        window.addEventListener('click', (e) => {
            const modal = document.getElementById('log-modal');
            if (e.target === modal) closeModal();
        });
    </script>
</body>

</html>
