[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_ANON_KEY,SUPABASE_URL,SUPABASE_SERVICE_ROLE_KEY"
  # Aquí se pueden definir variables por defecto si se desea
  # Pero lo ideal es configurarlas en el panel de Netlify

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
